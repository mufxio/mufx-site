<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CIPHER — muFX Intelligence Terminal</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" type="image/svg+xml" href="/mufx-favicon.svg">
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500&family=DM+Sans:opsz,wght@9..40,200;9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<style>
  *{margin:0;padding:0;box-sizing:border-box}
  body{background:#030810;font-family:'JetBrains Mono',monospace;overflow-x:hidden}
  
  /* Correlation Banner */
  .corr-banner{
    position:fixed;top:0;left:0;right:0;z-index:9999;
    height:28px;background:rgba(3,8,16,0.95);
    border-bottom:1px solid rgba(0,247,255,0.06);
    overflow:hidden;display:flex;align-items:center;
    backdrop-filter:blur(10px);
  }
  .corr-track{
    display:flex;gap:0;animation:corrScroll 40s linear infinite;
    width:max-content;
  }
  .corr-track:hover{animation-play-state:paused}
  .corr-chip{
    display:flex;align-items:center;gap:6px;
    padding:0 16px;height:28px;
    border-right:1px solid rgba(0,247,255,0.03);
    cursor:default;white-space:nowrap;
  }
  .corr-chip:hover{background:rgba(0,247,255,0.03)}
  .corr-name{font-size:8px;letter-spacing:1px;color:rgba(90,138,155,0.7)}
  .corr-nums{font-size:8px;color:rgba(90,138,155,0.5)}
  .corr-div{font-size:9px;font-weight:500}
  .corr-div.pos{color:#ffd700}
  .corr-div.neg{color:#00f7ff}
  .corr-div.flip{color:#ff006a}
  .corr-flip-tag{
    font-size:6px;letter-spacing:1px;color:#ff006a;
    border:1px solid rgba(255,0,106,0.2);padding:0 3px;
  }
  @keyframes corrScroll{0%{transform:translateX(0)}100%{transform:translateX(-50%)}}
  
  /* Push content below banner */
  #cipher-root{padding-top:28px}
  
  /* Loading state */
  .cipher-loading{
    display:flex;align-items:center;justify-content:center;
    height:100vh;flex-direction:column;gap:12px;
    font-family:'JetBrains Mono',monospace;color:#00f7ff;
  }
  .cipher-loading .spinner{
    width:24px;height:24px;border:2px solid rgba(0,247,255,0.1);
    border-top-color:#00f7ff;border-radius:50%;
    animation:spin 0.8s linear infinite;
  }
  @keyframes spin{to{transform:rotate(360deg)}}
  .cipher-loading .status{font-size:9px;letter-spacing:3px;color:rgba(0,247,255,0.4)}
  .cipher-loading .sub{font-size:7px;color:rgba(0,247,255,0.2);margin-top:4px}
  
  /* Error state */
  .cipher-error{
    display:flex;align-items:center;justify-content:center;
    height:100vh;flex-direction:column;gap:16px;
    font-family:'JetBrains Mono',monospace;
  }
  .cipher-error .msg{font-size:10px;color:#ff006a;letter-spacing:2px}
  .cipher-error .hint{font-size:8px;color:rgba(200,210,220,0.3)}
  .cipher-error button{
    background:none;border:1px solid rgba(0,247,255,0.1);
    color:#00f7ff;padding:8px 20px;font-family:'JetBrains Mono',monospace;
    font-size:8px;letter-spacing:2px;cursor:pointer;
  }
  .cipher-error button:hover{background:rgba(0,247,255,0.03)}
</style>
</head>
<body>

<!-- Correlation Banner -->
<div class="corr-banner" id="corr-banner" style="display:none">
  <div class="corr-track" id="corr-track"></div>
</div>

<!-- React mount point -->
<div id="cipher-root">
  <div class="cipher-loading">
    <div class="spinner"></div>
    <div class="status">CONNECTING TO CIPHER</div>
    <div class="sub">Fetching latest briefing from server...</div>
  </div>
</div>

<!-- File upload fallback (hidden) -->
<input type="file" id="fallback-upload" accept=".json" style="display:none">

<!-- React + ReactDOM + Babel -->
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>

<script>
// ═══ CONFIG ═══
const CIPHER_API = 'https://api.mufx.io';
const REFRESH_INTERVAL = 60 * 60 * 1000;

// ═══ CORRELATION BANNER (vanilla JS, outside React) ═══
function renderCorrelationBanner(correlations) {
  if (!correlations || !correlations.length) return;
  const banner = document.getElementById('corr-banner');
  const track = document.getElementById('corr-track');
  banner.style.display = 'flex';
  const chips = correlations.slice(0, 10);
  const html = [...chips, ...chips].map(c => {
    const abs = Math.abs(c.divergence);
    const flipped = Math.sign(c.corr_1y) !== Math.sign(c.corr_20d) && abs > 0.15;
    const cls = flipped ? 'flip' : c.divergence > 0 ? 'pos' : 'neg';
    const sign = c.divergence > 0 ? '+' : '';
    return `<div class="corr-chip">
      <span class="corr-name">${c.pair}</span>
      <span class="corr-nums">1Y:${c.corr_1y > 0 ? '+' : ''}${c.corr_1y}</span>
      <span class="corr-nums">&rarr;</span>
      <span class="corr-nums">20d:${c.corr_20d > 0 ? '+' : ''}${c.corr_20d}</span>
      <span class="corr-div ${cls}">${sign}${c.divergence}</span>
      ${flipped ? '<span class="corr-flip-tag">FLIP</span>' : ''}
    </div>`;
  }).join('');
  track.innerHTML = html;
}

// ═══ DATA FETCH ═══
async function fetchBriefing() {
  try {
    const res = await fetch(CIPHER_API + '/api/briefing/latest');
    if (!res.ok) throw new Error(`HTTP ${res.status}`);
    return await res.json();
  } catch (e) {
    console.error('API fetch failed:', e);
    return null;
  }
}

// ═══ BOOT SEQUENCE ═══
let _briefingData = null;

async function boot() {
  const briefing = await fetchBriefing();
  if (briefing) {
    _briefingData = briefing;
    renderCorrelationBanner(briefing.correlations);
    mountReactPortal(briefing);
    // auto-refresh
    setInterval(async () => {
      const fresh = await fetchBriefing();
      if (fresh) {
        _briefingData = fresh;
        renderCorrelationBanner(fresh.correlations);
        mountReactPortal(fresh);
      }
    }, REFRESH_INTERVAL);
  } else {
    // Show error with file upload fallback
    document.getElementById('cipher-root').innerHTML = `
      <div class="cipher-error">
        <div class="msg">CIPHER API UNREACHABLE</div>
        <div class="hint">Could not connect to ${CIPHER_API}</div>
        <button onclick="document.getElementById('fallback-upload').click()">UPLOAD BRIEFING JSON</button>
        <button onclick="location.reload()">RETRY CONNECTION</button>
      </div>`;
    document.getElementById('fallback-upload').addEventListener('change', (e) => {
      const file = e.target.files[0];
      if (!file) return;
      const reader = new FileReader();
      reader.onload = (ev) => {
        try {
          const data = JSON.parse(ev.target.result);
          _briefingData = data;
          renderCorrelationBanner(data.correlations);
          mountReactPortal(data);
        } catch(err) { console.error(err); }
      };
      reader.readAsText(file);
    });
  }
}

function mountReactPortal(briefing) {
  // Store briefing globally for the React component
  window.__CIPHER_BRIEFING__ = briefing;
  const root = document.getElementById('cipher-root');
  ReactDOM.render(React.createElement(window.CipherPortal), root);
}

window.addEventListener('DOMContentLoaded', boot);
</script>

<!-- ═══ FULL CIPHER PORTAL (JSX transpiled by Babel) ═══ -->
<script type="text/babel">
const { useState, useEffect, useRef } = React;

const PW = "kova2026";

// ═══ COMPUTE — Thin mapper over briefing structure ═══
const compute = (b) => {
  if (!b?.derivatives) return null;
  const dv = b.derivatives, sp = dv.spot||{}, ch = dv.changes_pct||{}, fr = dv.fred||{},
    ct = dv.cot||{}, cr = dv.crypto||{}, ph = dv.physical||{}, cb = dv.central_banks||{},
    fo = dv.fed_ops||{}, pc = dv.percentiles||{}, zs = dv.zscores||{};

  const vix=sp.vix||0, hy=fr.hy_oas||0;
  const rv=Math.min(vix/40*100,100), rc=Math.min(hy/6*100,100),
    rg=Math.min(Math.abs(ch.gold||0)/5*100,100), ro=Math.min(Math.abs(ch.brent||0)/8*100,100),
    rf=Math.min(Math.abs(ch.dxy||0)/2*100,100), re=Math.min(((sp.vix||0)>20?50:0 + Math.abs(ch.gold||0)*10)/100*100,100);

  const cotArr = Object.entries(ct).map(([k,v])=>({
    id:k, name:k.replace(/_/g," ").toUpperCase(), pct:v.net_pct_oi,
    oi:v.oi, net:v.net, ncL:v.long, ncS:v.short
  })).sort((a,b)=>Math.abs(b.pct)-Math.abs(a.pct));

  const stables = Object.entries(cr.stables||{}).map(([k,v])=>({name:k,mcap:v})).sort((a,b)=>b.mcap-a.mcap);

  const fps = [];
  const rawFirms = b.pipes?.firms?.data||{};
  Object.entries(rawFirms).forEach(([zone,data])=>{
    if(data?.fires) data.fires.forEach(f=>{fps.push({zone,lat:f.latitude||f.lat,lon:f.longitude||f.lon,brightness:f.brightness,conf:f.confidence,frp:f.frp});});
  });

  return {
    date:b.date, pipesOk:b.meta?.pipes_successful, flags:b.validation?.summary?.total_flags,
    gold:sp.gold, silver:sp.silver, copper:sp.copper, brent:sp.brent, wti:sp.wti, natgas:sp.natgas,
    dxy:sp.dxy, spx:sp.spx, vix:sp.vix, btc:sp.btc, nikkei:sp.nikkei,
    eurusd:sp.eurusd, usdjpy:sp.usdjpy, gbpusd:sp.gbpusd, audusd:sp.audusd, usdcad:sp.usdcad, usdchf:sp.usdchf,
    goldPct:ch.gold, silverPct:ch.silver, copperPct:ch.copper, brentPct:ch.brent, wtiPct:ch.wti,
    natgasPct:ch.natgas, dxyPct:ch.dxy, spxPct:ch.spx, vixPct:ch.vix, btcPct:ch.btc, nikkeiPct:ch.nikkei,
    eurusdPct:ch.eurusd, usdjpyPct:ch.usdjpy, gbpusdPct:ch.gbpusd, audusdPct:ch.audusd, usdcadPct:ch.usdcad, usdchfPct:ch.usdchf,
    gsR:dv.gold_silver_ratio, goR:dv.gold_oil_ratio, bwS:dv.brent_wti_spread, ogR:dv.oil_gas_ratio,
    s2s10:dv.curve_2s10s, s5s30:dv.curve_5s30s, s10s30:dv.curve_10s30s,
    real10:dv.real_yield_10y, real5:dv.real_yield_5y,
    hyIg:dv.credit_spread_hy_ig, sofrEffr:dv.sofr_effr_spread, usDeS:dv.us_germany_10y_spread,
    netLiq:dv.net_liquidity_b, basis:dv.btc_basis_pct, cxCov:dv.comex_gld_coverage_pct,
    y2:fr.y2, y5:fr.y5, y10:fr.y10, y30:fr.y30, be5:fr.be5, be10:fr.be10,
    ig:fr.ig_oas, hy:fr.hy_oas, sofr:fr.sofr, effr:fr.effr,
    rrp:fr.rrp, tga:fr.tga, m2:fr.m2, de10:fr.de_10y, mortgage:fr.mortgage_30y,
    unemp:fr.unemployment, claims:fr.claims,
    fedBS:fr.walcl, bsChg:fr.walcl_chg, tgaChg:fr.tga_chg, reserveBal:fr.reserve_bal,
    walclB:dv.walcl_b, tgaB:dv.tga_b, rrpB:dv.rrp_b,
    fg:cr.fear_greed, fgL:cr.fear_greed_label, fgH:cr.fear_greed_7d||[],
    btcDom:cr.btc_dom, ethDom:cr.eth_dom, mcapT:cr.total_mcap_t, stMcapB:cr.stablecoin_mcap_b,
    tvlB:cr.tvl_b, tvlWk:cr.tvl_weekly_chg, perpBtc:cr.perp_btc, perpEth:cr.perp_eth,
    gldT:ph.gld_tonnes, gldH:ph.gld_history_10d||[],
    cxGR:ph.comex_gold_reg_t, cxGE:ph.comex_gold_elig_t, cxGRp:ph.comex_gold_reg_pct,
    cxSR:ph.comex_silver_reg_t, cxSE:ph.comex_silver_elig_t, cxSRp:ph.comex_silver_reg_pct,
    cxTotB:ph.comex_value_b, sgeCny:dv.sge_cny_gram,
    pboc:cb.pboc_fix, bojR:cb.boj_rate, bojZ:cb.boj_zone,
    ecbD:cb.ecb_depo, ecbR:cb.ecb_refi, cnyS:dv.cnh_onshore_spread,
    cot:cotArr, stables,
    cGold:ct.gold?.net_pct_oi, cSilver:ct.silver?.net_pct_oi, cCopper:ct.copper?.net_pct_oi,
    cWti:ct.wti?.net_pct_oi, cBrent:ct.brent?.net_pct_oi, cVix:ct.vix?.net_pct_oi,
    c10y:ct.ust_10y?.net_pct_oi, c2y:ct.ust_2y?.net_pct_oi, cNg:ct.natgas?.net_pct_oi,
    cEur:ct.eurusd?.net_pct_oi, cJpy:ct.usdjpy?.net_pct_oi, cGbp:ct.gbpusd?.net_pct_oi,
    cChf:ct.usdchf?.net_pct_oi, cAud:ct.audusd?.net_pct_oi, cCad:ct.usdcad?.net_pct_oi,
    correlations: (b.correlations||[]).map(c=>({...c})),
    summary:b.summary||{},
    fps,
    zones:(dv.firms?.zones||[]).map(z=>({id:z.id,name:z.name||z.id,fires:z.fires,high:z.high})),
    totF:dv.firms?.total_fires, totH:dv.firms?.total_high,
    poly:(dv.polymarket||[]).map(m=>({question:m.question,yes_probability:m.yes_pct})),
    percentiles:pc, zscores:zs,
    goldMa:dv.gold_ma, dxyMa:dv.dxy_ma, spxMa:dv.spx_ma, eurusdMa:dv.eurusd_ma, brentMa:dv.brent_ma,
    regime:{vol:rv,credit:rc,gold:rg,oil:ro,fx:rf,geo:re},
    oilInv:dv.oil_inventories||{},
    news: Object.values(b.pipes?.news_sentiment?.data||{}).flatMap(c=>c.articles||[]).filter(a=>a.title).slice(0,20),
    newsSentiment: Object.entries(b.pipes?.news_sentiment?.data||{}).map(([k,v])=>({cat:k,sentiment:v.avg_sentiment,count:v.article_count,signal:v.sentiment_signal})),
    swift:dv.swift_shares||{}, swiftTrends:dv.swift_trends||{},
    fpi:dv.food_price_index||{},
    indirectTrend:dv.indirect_bid_trend||{},
    wheat:sp.wheat, corn:sp.corn, soybeans:sp.soybeans,
    wheatPct:ch.wheat, cornPct:ch.corn, soyPct:ch.soybeans,
    copperGoldRatio:dv.copper_gold_ratio,
    reserveBalB:dv.reserve_balances_b,
    goldReserves:dv.gold_reserves||{}, goldResRankings:dv.gold_reserves_rankings||{},
    fxReserves:dv.fx_reserves||{}, fxDrawdowns:dv.fx_reserves_drawdowns||[],
    recentAuctions:(dv.recent_auctions||[]).slice(0,8),
  };
};

// ═══ RADAR ═══
const Radar = ({data}) => {
  const ax=[{k:"vol",l:"VOL",c:"#ff006a"},{k:"credit",l:"CREDIT",c:"#ff6b00"},{k:"gold",l:"GOLD",c:"#ffd700"},
    {k:"oil",l:"OIL",c:"#00f7ff"},{k:"fx",l:"FX",c:"#b388ff"},{k:"geo",l:"GEO",c:"#00ff88"}];
  const cx=82,cy=78,r=58,n=ax.length;
  const ang=i=>(Math.PI*2*i/n)-Math.PI/2;
  const pt=(i,p)=>[cx+Math.cos(ang(i))*r*p/100,cy+Math.sin(ang(i))*r*p/100];
  const dp=ax.map((a,i)=>pt(i,data[a.k]||0)).map((p,i)=>(i===0?"M":"L")+p[0]+" "+p[1]).join(" ")+"Z";
  const avg=ax.reduce((s,a)=>s+(data[a.k]||0),0)/n;
  const ac=avg>60?"#ff006a":avg>35?"#ffd700":"#00ff88";
  return <svg width="164" height="160" viewBox="0 0 164 160">
    {[25,50,75,100].map(p=><polygon key={p} points={ax.map((_,i)=>pt(i,p).join(",")).join(" ")} fill="none" stroke="#0a1a2a" strokeWidth={p===50?"0.5":"0.25"}/>)}
    {ax.map((_,i)=><line key={i} x1={cx} y1={cy} x2={pt(i,100)[0]} y2={pt(i,100)[1]} stroke="#0a1a2a" strokeWidth="0.25"/>)}
    <path d={dp} fill={ac+"10"} stroke={ac} strokeWidth="1.4" opacity="0.65"/>
    {ax.map((a,i)=>{const[px,py]=pt(i,data[a.k]||0);const[lx,ly]=pt(i,118);
      return <g key={a.k}><circle cx={px} cy={py} r="2.5" fill={a.c} opacity="0.65"/>
        <text x={lx} y={ly+3} textAnchor="middle" fill={a.c} fontSize="6" opacity="0.6">{a.l}</text>
        <text x={lx} y={ly+11} textAnchor="middle" fill="#4a6a7a" fontSize="7">{Math.round(data[a.k]||0)}</text></g>;})}
    <text x={cx} y={cy+4} textAnchor="middle" fill={ac} fontSize="13" fontWeight="bold">{Math.round(avg)}</text>
    <text x={cx} y={cy+12} textAnchor="middle" fill="#2a4a5a" fontSize="5">STRESS</text>
  </svg>;
};

// ═══ DONUT ═══
const Donut = ({pct,label,sub,size=66,accent="#ffd700"}) => {
  const rd=size/2-5,circ=2*Math.PI*rd,filled=circ*(pct||0)/100;
  return <div style={{textAlign:"center",display:"inline-block"}}>
    <svg width={size} height={size} viewBox={"0 0 "+size+" "+size}>
      <circle cx={size/2} cy={size/2} r={rd} fill="none" stroke="#0a1520" strokeWidth="3.5"/>
      <circle cx={size/2} cy={size/2} r={rd} fill="none" stroke={accent} strokeWidth="3.5"
        strokeDasharray={filled+" "+(circ-filled)} strokeDashoffset={circ/4} strokeLinecap="round" opacity="0.65"/>
      <text x={size/2} y={size/2+1} textAnchor="middle" fill={accent} fontSize="11" fontWeight="bold" dominantBaseline="middle">{pct}%</text>
    </svg>
    <div style={{fontSize:6.5,color:accent,letterSpacing:0.8,marginTop:-1}}>{label}</div>
    {sub&&<div style={{fontSize:5.5,color:"#2a4a5a"}}>{sub}</div>}
  </div>;
};

// ═══ COT STACKED BAR ═══
const CotStack = ({name,ncL,ncS,pct}) => {
  if(!ncL&&!ncS) return null;
  const total=(ncL||0)+(ncS||0);const lp=total>0?ncL/total*100:50;
  return <div style={{marginBottom:3}}>
    <div style={{display:"flex",justifyContent:"space-between",marginBottom:1.5}}>
      <span style={{fontSize:7,color:"#5a8a9b"}}>{name}</span>
      <span style={{fontSize:7,color:pct>0?"#00ff88":"#ff006a"}}>{pct>0?"+":""}{pct}%</span>
    </div>
    <div style={{display:"flex",height:5,background:"#060e18",overflow:"hidden"}}>
      <div style={{width:lp+"%",background:"#00ff88",opacity:0.45}}/>
      <div style={{width:(100-lp)+"%",background:"#ff006a",opacity:0.45}}/>
    </div>
    <div style={{display:"flex",justifyContent:"space-between",fontSize:5.5,color:"#2a4a5a",marginTop:1}}>
      <span>{(ncL/1000).toFixed(0)}K long</span><span>{(ncS/1000).toFixed(0)}K short</span>
    </div>
  </div>;
};

// ═══ PROBABILITY BAR ═══
const ProbBar = ({question,prob}) => {
  const c=prob>70?"#00ff88":prob>40?"#ffd700":"#ff006a";
  return <div style={{marginBottom:3}}>
    <div style={{fontSize:6.5,color:"#4a7a9b",marginBottom:1.5}}>{question?.substring(0,58)}</div>
    <div style={{display:"flex",alignItems:"center",gap:4}}>
      <div style={{flex:1,height:4,background:"#060e18",overflow:"hidden"}}>
        <div style={{width:prob+"%",height:"100%",background:c,opacity:0.5}}/></div>
      <span style={{fontSize:7.5,color:c,fontWeight:"bold",minWidth:26,textAlign:"right"}}>{prob}%</span>
    </div>
  </div>;
};

// ═══ YIELD DECOMP ═══
const YieldDecomp = ({nominal,breakeven,real}) => {
  if(!nominal) return null;
  const W=130,H=55,pad=4,bW=26,gap=16;
  const mx=Math.max(nominal,breakeven||0,Math.abs(real||0))+0.5;
  const sc=v=>Math.abs(v)/mx*(H-pad*2);
  const bars=[{x:pad,v:nominal,c:"#00f7ff",l:"NOM"},{x:pad+bW+gap,v:breakeven,c:"#ffd700",l:"INFL"},{x:pad+2*(bW+gap),v:real,c:"#00ff88",l:"REAL"}];
  return <svg width={W} height={H+16} viewBox={"0 0 "+W+" "+(H+16)}>
    {bars.map(b=><g key={b.l}><rect x={b.x} y={H-pad-sc(b.v)} width={bW} height={sc(b.v)} fill={b.c} opacity="0.35"/>
      <text x={b.x+bW/2} y={H-pad-sc(b.v)-3} textAnchor="middle" fill={b.c} fontSize="8" fontWeight="bold">{b.v}%</text>
      <text x={b.x+bW/2} y={H+9} textAnchor="middle" fill="#2a4a5a" fontSize="5.5">{b.l}</text></g>)}
  </svg>;
};

// ═══ STABLE DONUT ═══
const StableDonut = ({stables,total}) => {
  if(!stables?.length) return null;
  const rd=28,cxx=35,cyy=35,circ=2*Math.PI*rd;
  const cols=["#00f7ff","#b388ff","#ffd700","#00ff88"];
  let off=circ/4;
  const segs=stables.map((s,i)=>{
    const pct=total>0?s.mcap/total*100:0;
    const seg=circ*pct/100;
    const o=off; off-=seg;
    return {name:s.name,mcap:s.mcap,seg,off:o,col:cols[i%cols.length]};
  });
  return <div style={{display:"flex",alignItems:"center",gap:10}}>
    <svg width="70" height="70" viewBox="0 0 70 70">
      <circle cx={cxx} cy={cyy} r={rd} fill="none" stroke="#0a1520" strokeWidth="5"/>

// ═══ FIRE MAP ═══
const FireMap = ({fires,zones}) => {
  const canvasRef=useRef(null),animRef=useRef(null);
  useEffect(()=>{
    const c=canvasRef.current;if(!c) return;const ctx=c.getContext("2d");
    const dpr=window.devicePixelRatio||1,rect=c.getBoundingClientRect();
    c.width=rect.width*dpr;c.height=rect.height*dpr;ctx.scale(dpr,dpr);
    const w=rect.width,h=rect.height;
    const proj=(lat,lon)=>{const x=((lon+180)/360)*w;const lr=lat*Math.PI/180;const y=(h/2)-(w*Math.log(Math.tan(Math.PI/4+lr/2)))/(2*Math.PI);return[x,y];};
    let frame=0;
    const tick=()=>{frame++;ctx.fillStyle="#020a14";ctx.fillRect(0,0,w,h);
      ctx.strokeStyle="rgba(0,247,255,0.015)";ctx.lineWidth=0.3;
      for(let la=-60;la<=80;la+=15){const[,y]=proj(la,0);ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(w,y);ctx.stroke();}
      for(let lo=-180;lo<=180;lo+=20){const[x]=proj(0,lo);ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,h);ctx.stroke();}
      ctx.strokeStyle="rgba(0,247,255,0.05)";ctx.lineWidth=0.5;
      [[[71,-25],[36,-10],[36,45],[12,50],[-35,20],[-35,15],[5,-18]],
       [[36,45],[10,80],[5,105],[22,120],[40,128],[55,140],[70,170],[71,40]],
       [[32,32],[30,48],[25,60],[12,44]],
       [[48,-8],[55,28],[55,60],[70,60],[71,-25],[48,-8]]
      ].forEach(pts=>{ctx.beginPath();pts.forEach(([la,lo],i)=>{const[x,y]=proj(la,lo);i===0?ctx.moveTo(x,y):ctx.lineTo(x,y);});ctx.stroke();});
      fires.forEach((f,i)=>{const[x,y]=proj(f.lat,f.lon);if(x<-10||x>w+10||y<-10||y>h+10)return;
        const isH=f.conf==="h"||f.conf==="high",pulse=Math.sin(frame*0.04+i*0.7)*0.3+0.7,sz=isH?3.5:1.8;
        const grad=ctx.createRadialGradient(x,y,0,x,y,sz*5);
        grad.addColorStop(0,isH?"rgba(255,0,106,"+(0.3*pulse)+")":"rgba(255,140,40,"+(0.12*pulse)+")");
        grad.addColorStop(1,"transparent");ctx.fillStyle=grad;ctx.fillRect(x-sz*5,y-sz*5,sz*10,sz*10);
        ctx.beginPath();ctx.arc(x,y,sz*pulse,0,Math.PI*2);
        ctx.fillStyle=isH?"rgba(255,0,106,"+(0.75*pulse)+")":"rgba(255,140,40,"+(0.45*pulse)+")";ctx.fill();});
      const zc={strait_of_hormuz:[26,56],red_sea:[15,40],iran:[32,53],israel_lebanon:[33,35],ukraine:[49,32],taiwan_strait:[24,120],saudi_oil:[24,46],libya_oil:[28,18]};
      ctx.font="7px monospace";
      zones.forEach(z=>{const center=zc[z.id];if(!center||z.fires===0)return;const[x,y]=proj(center[0],center[1]);
        ctx.fillStyle=z.high>0?"rgba(255,0,106,0.65)":"rgba(255,160,64,0.45)";
        ctx.fillText(z.name.replace(/_/g," ").toUpperCase().substring(0,14),x+8,y-2);
        ctx.fillStyle="rgba(0,247,255,0.35)";ctx.fillText(z.fires+(z.high?" | "+z.high+"H":""),x+8,y+8);});
      animRef.current=requestAnimationFrame(tick);};
    tick();return()=>{if(animRef.current)cancelAnimationFrame(animRef.current);};
  },[fires,zones]);
  return <div style={{position:"relative",width:"100%",height:200,overflow:"hidden"}}>
    <canvas ref={canvasRef} style={{width:"100%",height:"100%"}}/>
    <div style={{position:"absolute",top:6,left:8,fontSize:7,color:"#00f7ff55",letterSpacing:2}}>NASA FIRMS</div>
    <div style={{position:"absolute",bottom:5,right:8,fontSize:6,color:"#1a3a4a"}}>{fires.length} DETECTIONS</div>
  </div>;
};

    {id:"fx",l:"FX"},{id:"risk",l:"RISK"},{id:"crypto",l:"CRYPTO"},{id:"geo",l:"GEO"},{id:"liq",l:"LIQUIDITY"}];

  return <div style={{position:"relative",zIndex:10,minHeight:"100vh",fontFamily:"monospace",color:"#b0d4ea"}}>
    <Bg/>
    <div style={{position:"fixed",top:scanY+"%",left:0,right:0,height:1,background:"rgba(0,247,255,0.02)",zIndex:999,pointerEvents:"none"}}/>
    <div style={{position:"relative",zIndex:10,maxWidth:1400,margin:"0 auto",padding:"8px 12px"}}>
      {/* Header */}
      <div style={{display:"flex",justifyContent:"space-between",alignItems:"center",padding:"5px 0 7px",borderBottom:"1px solid rgba(0,247,255,0.04)",marginBottom:8}}>
        <div style={{display:"flex",alignItems:"center",gap:7}}>
          <span style={{fontSize:12,letterSpacing:5,color:"#00f7ff",fontWeight:"bold"}}>CIPHER</span>
          <span style={{fontSize:6,color:"#1a3a4a",letterSpacing:2}}>MUFX INTELLIGENCE</span></div>
        <div style={{display:"flex",alignItems:"center",gap:10}}>
          <div style={{textAlign:"right"}}>
            <div style={{fontSize:10,color:"#00f7ff",letterSpacing:2}}>{time.toLocaleTimeString("en-US",{hour12:false})}</div>
            <div style={{fontSize:6,color:"#1a3a4a"}}>{a.date} | {a.pipesOk} PIPES | {a.flags} FLAGS</div></div>
          <div style={{width:5,height:5,borderRadius:"50%",background:"#00ff88",boxShadow:"0 0 4px #00ff88",animation:"blink 3s infinite"}}/></div>
      </div>
      {/* Tabs */}
      <div style={{display:"flex",gap:0,marginBottom:10,borderBottom:"1px solid rgba(0,247,255,0.03)",overflowX:"auto"}}>
        {tabs.map(t=><button key={t.id} onClick={()=>setTab(t.id)} style={{background:tab===t.id?"rgba(0,247,255,0.03)":"transparent",border:"none",
          borderBottom:tab===t.id?"1px solid #00f7ff":"1px solid transparent",color:tab===t.id?"#00f7ff":"#1a4a6a",
          padding:"7px 11px",fontSize:7,letterSpacing:1.5,cursor:"pointer",fontFamily:"monospace",whiteSpace:"nowrap"}}>{t.l}</button>)}
      </div>

      {/* COMMAND */}
      {tab==="cmd"&&<div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:7,animation:"fadeIn 0.3s"}}>
        <Panel title="REGIME RADAR" glow><Radar data={a.regime}/></Panel>
        <Panel title="PRECIOUS METALS" accent="#ffd700">
          <Stat label="GOLD" value={a.gold} pct={a.goldPct} prefix="$" big accent="#ffd700"/>
          <Stat label="SILVER" value={a.silver} pct={a.silverPct} prefix="$"/>
          <Stat label="Au/Ag" value={a.gsR} dec={1}/><Stat label="Au/Oil" value={a.goR} dec={1}/>
          <Spark data={a.gldH} label="GLD" vKey="close" w={75} h={20}/></Panel>
        <Panel title="ENERGY">
          <Stat label="BRENT" value={a.brent} pct={a.brentPct} prefix="$" big/>
          <Stat label="WTI" value={a.wti} pct={a.wtiPct} prefix="$"/>
          <Stat label="B-W" value={a.bwS} prefix="$"/><Stat label="NATGAS" value={a.natgas} pct={a.natgasPct} prefix="$" dec={3}/></Panel>
        <Panel title="SENTIMENT" accent={a.fg<=20?"#ff006a":"#00f7ff"}>
          <FGGauge value={a.fg} label={a.fgL}/><Stat label="BTC" value={a.btc} pct={a.btcPct} prefix="$" dec={0}/>
          <Spark data={a.fgH} label="F/G" vKey="value" w={65} h={18}/></Panel>
        <Panel title="EQUITIES" accent={a.vix>25?"#ff006a":"#00f7ff"} alert={a.vix>30}>
          <Stat label="SPX" value={a.spx} pct={a.spxPct} dec={0} big/>
          <Stat label="NIKKEI" value={a.nikkei} pct={a.nikkeiPct} dec={0}/>
          <Stat label="VIX" value={a.vix} pct={a.vixPct} big accent={a.vix>25?"#ff006a":undefined}/></Panel>
        <Panel title="YIELD CURVE" accent="#b388ff">
          <YCurve y2={a.y2} y5={a.y5} y10={a.y10} y30={a.y30} be5={a.be5} be10={a.be10} r5={a.real5} r10={a.real10}/></Panel>
        <Panel title="CREDIT">
          <Stat label="IG OAS" value={a.ig} suffix="%" big/><Stat label="HY OAS" value={a.hy} suffix="%" big/>
          <Stat label="HY-IG" value={a.hyIg} suffix="%"/><Stat label="SOFR-EFFR" value={a.sofrEffr} suffix="%" dec={3}/></Panel>
        <Panel title="CORRELATIONS" accent="#b388ff" glow span={2}>
          {a.correlations.length>0 ? a.correlations.slice(0,6).map((c,i)=>{
            const abs=Math.abs(c.divergence);const intense=abs>0.3;const flipped=Math.sign(c.corr_1y)!==Math.sign(c.corr_20d)&&abs>0.15;
            const col=flipped?"#ff006a":intense?"#ffd700":"#4a7a9b";
            return <div key={i} style={{display:"flex",alignItems:"center",gap:6,padding:"3px 0",borderBottom:"1px solid rgba(0,80,160,0.03)"}}>
              <div style={{width:5,height:5,borderRadius:"50%",background:col,flexShrink:0}}/>
              <span style={{fontSize:7.5,color:"#5a8a9b",flex:1}}>{c.pair}</span>
              <span style={{fontSize:7,color:"#3a5a6b",minWidth:50}}>1Y {c.corr_1y>0?"+":""}{c.corr_1y}</span>
              <span style={{fontSize:7,color:col,fontWeight:"bold",minWidth:50}}>20d {c.corr_20d>0?"+":""}{c.corr_20d}</span>
              <span style={{fontSize:8,color:col,fontWeight:"bold",minWidth:40,textAlign:"right"}}>{c.divergence>0?"+":""}{c.divergence}</span>
              {flipped&&<span style={{fontSize:5,color:"#ff006a",letterSpacing:0.5}}>FLIP</span>}
            </div>;})
            : <div style={{fontSize:7,color:"#1a3a4a",textAlign:"center",padding:8}}>No correlation data</div>}
          <div style={{fontSize:5.5,color:"#1a3a4a",marginTop:4}}>Divergence = 20d correlation minus 1Y baseline. Large values = relationships changing. FLIP = sign reversal.</div>
        </Panel>
        <Panel title="1Y PERCENTILES" accent="#b388ff" span={2}>
          <div style={{display:"flex",gap:4,flexWrap:"wrap"}}>
            {Object.entries(a.percentiles||{}).map(([k,v])=>{
              const c=v>90?"#ff006a":v>75?"#ffd700":v<10?"#00ff88":v<25?"#00f7ff":"#3a5a6b";
              return <div key={k} style={{textAlign:"center",padding:"3px 6px",minWidth:48,background:c+"08",border:"1px solid "+c+"15"}}>
                <div style={{fontSize:5.5,color:"#3a5a6b",letterSpacing:0.5}}>{k.toUpperCase()}</div>
                <div style={{fontSize:11,color:c,fontWeight:"bold"}}>{v}</div>
              </div>;})}
            {a.copperGoldRatio&&<div style={{textAlign:"center",padding:"3px 6px",minWidth:48,background:"rgba(0,10,25,0.2)",border:"1px solid rgba(0,247,255,0.05)"}}>
              <div style={{fontSize:5.5,color:"#3a5a6b",letterSpacing:0.5}}>CU/AU</div>
              <div style={{fontSize:11,color:"#b0d4ea",fontWeight:"bold"}}>{a.copperGoldRatio}</div></div>}
          </div>
        </Panel>
        <Panel title="NET LIQUIDITY" span={2}><LiqPipe bs={a.walclB} tga={a.tgaB} rrp={a.rrpB} net={a.netLiq}/></Panel>
        <Panel title="COT POSITIONING" span={2}><CotMap cot={a.cot}/></Panel>
        <Panel title="TOP MOVERS" span={2}>
          <div style={{display:"flex",gap:5,flexWrap:"wrap"}}>
            {(a.summary?.top_movers||[]).map((m,i)=>{const c=m.pct>0?"#00ff88":"#ff006a";
              return <div key={i} style={{textAlign:"center",padding:"4px 8px",minWidth:60,background:c+"08",border:"1px solid "+c+"18"}}>
                <div style={{fontSize:6,color:"#3a5a6b",letterSpacing:1}}>{m.asset.toUpperCase()}</div>
                <div style={{fontSize:13,color:c,fontWeight:"bold"}}>{m.pct>0?"+":""}{m.pct}%</div></div>;})}
          </div>
        </Panel>
        <Panel title="NEWS FEED" span={2}>
          {a.news.slice(0,8).map((n,i)=><NewsLine key={i} title={n.title} source={n.source} sentiment={n.sentiment}/>)}
          {a.news.length===0&&<div style={{fontSize:7,color:"#1a3a4a",textAlign:"center",padding:8}}>No news data</div>}
        </Panel>
        <Panel title="SUPPLY" span={2}>
          <div style={{display:"flex",gap:6,flexWrap:"wrap",justifyContent:"center"}}>
            {a.oilInv?.commercial_crude&&<div style={{textAlign:"center",padding:"4px 8px",minWidth:70,background:"rgba(0,10,25,0.2)",border:"1px solid rgba(0,247,255,0.05)"}}>
              <div style={{fontSize:5.5,color:"#3a5a6b"}}>CRUDE</div>
              <div style={{fontSize:12,color:"#b0d4ea",fontWeight:"bold"}}>{(a.oilInv.commercial_crude.value/1000).toFixed(0)}M</div>
              <div style={{fontSize:6,color:(a.oilInv.commercial_crude.change||0)>0?"#ff006a":"#00ff88"}}>{a.oilInv.commercial_crude.change>0?"+":""}{(a.oilInv.commercial_crude.change/1000).toFixed(1)}M</div></div>}
            {a.oilInv?.days_of_supply!=null&&<div style={{textAlign:"center",padding:"4px 8px",minWidth:70,background:"rgba(0,10,25,0.2)",border:"1px solid rgba(0,247,255,0.05)"}}>
              <div style={{fontSize:5.5,color:"#3a5a6b"}}>DAYS SUPPLY</div>
              <div style={{fontSize:12,color:a.oilInv.days_of_supply<25?"#ff006a":"#b0d4ea",fontWeight:"bold"}}>{a.oilInv.days_of_supply}</div></div>}
            {a.oilInv?.spr&&<div style={{textAlign:"center",padding:"4px 8px",minWidth:70,background:"rgba(0,10,25,0.2)",border:"1px solid rgba(0,247,255,0.05)"}}>
              <div style={{fontSize:5.5,color:"#3a5a6b"}}>SPR</div>
              <div style={{fontSize:12,color:"#b0d4ea",fontWeight:"bold"}}>{(a.oilInv.spr.value/1000).toFixed(0)}M</div></div>}
            {a.fpi?.value&&<div style={{textAlign:"center",padding:"4px 8px",minWidth:70,background:a.fpi.alert?.includes("CRISIS")?"rgba(255,0,106,0.06)":"rgba(0,10,25,0.2)",border:"1px solid "+(a.fpi.alert?.includes("CRISIS")?"rgba(255,0,106,0.12)":"rgba(0,247,255,0.05)")}}>
              <div style={{fontSize:5.5,color:"#3a5a6b"}}>FAO FPI</div>
              <div style={{fontSize:12,color:a.fpi.value>130?"#ff006a":"#b0d4ea",fontWeight:"bold"}}>{a.fpi.value}</div>
              <div style={{fontSize:5,color:"#1a3a4a"}}>{a.fpi.alert}</div></div>}
            {a.wheat&&<div style={{textAlign:"center",padding:"4px 8px",minWidth:55,background:"rgba(0,10,25,0.2)",border:"1px solid rgba(0,247,255,0.05)"}}>
              <div style={{fontSize:5.5,color:"#3a5a6b"}}>WHEAT</div>
              <div style={{fontSize:10,color:"#b0d4ea"}}>{a.wheat?.toFixed(0)}</div>
              <div style={{fontSize:6,color:(a.wheatPct||0)>0?"#00ff88":"#ff006a"}}>{a.wheatPct?.toFixed(1)}%</div></div>}
            {a.corn&&<div style={{textAlign:"center",padding:"4px 8px",minWidth:55,background:"rgba(0,10,25,0.2)",border:"1px solid rgba(0,247,255,0.05)"}}>
              <div style={{fontSize:5.5,color:"#3a5a6b"}}>CORN</div>
              <div style={{fontSize:10,color:"#b0d4ea"}}>{a.corn?.toFixed(0)}</div>
              <div style={{fontSize:6,color:(a.cornPct||0)>0?"#00ff88":"#ff006a"}}>{a.cornPct?.toFixed(1)}%</div></div>}
          </div>
        </Panel>
      </div>}

      {/* GOLD */}
      {tab==="gold"&&<div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:7,animation:"fadeIn 0.3s"}}>
        <Panel title="SPOT METALS" accent="#ffd700" glow>
          <Stat label="XAU" value={a.gold} pct={a.goldPct} prefix="$" big accent="#ffd700"/>
          <Stat label="XAG" value={a.silver} pct={a.silverPct} prefix="$" big/>
          <Stat label="COPPER" value={a.copper} pct={a.copperPct} prefix="$" dec={3} big/></Panel>
        <Panel title="RELATIVE VALUE" accent="#ffd700">
          <Stat label="Au/Ag" value={a.gsR} dec={1} big/><Stat label="Au/Oil" value={a.goR} dec={1} big/>
          <div style={{fontSize:7,color:a.goR>60?"#ff006a":"#3a5a6b",marginTop:3}}>
            {a.goR>60?"EXTREME - safe-haven flight":a.goR>40?"ELEVATED":"NORMAL"}</div></Panel>
        <Panel title="MACRO DRIVERS" accent="#b388ff">
          <Stat label="Real 10Y" value={a.real10} suffix="%" big/><Stat label="Real 5Y" value={a.real5} suffix="%"/>
          <Stat label="DXY" value={a.dxy} pct={a.dxyPct} dec={3}/><Stat label="10Y BE" value={a.be10} suffix="%"/></Panel>
        <Panel title="PHYSICAL MARKET" accent="#ffd700" span={2}>
          <div style={{display:"grid",gridTemplateColumns:"auto auto 1fr",gap:12,alignItems:"start"}}>
            <Donut pct={a.cxGRp} label="AU REG" sub={a.cxGR?.toFixed(0)+"t"} accent="#ffd700"/>
            <Donut pct={a.cxSRp} label="AG REG" sub={a.cxSR?.toFixed(0)+"t"} accent="#b0d4ea"/>
            <div><Stat label="Au Eligible" value={a.cxGE} suffix="t" dec={1}/><Stat label="COMEX Value" value={a.cxTotB} prefix="$" suffix="B"/>
              <Stat label="COMEX/GLD" value={a.cxCov} suffix="%"/><Stat label="GLD" value={a.gldT} suffix="t" dec={1}/>
              <Stat label="SGE CNY/g" value={a.sgeCny} dec={2}/><Spark data={a.gldH} label="GLD" vKey="close" w={80} h={22}/></div></div></Panel>
        <Panel title="METALS COT" accent="#00f7ff">
          {a.cot.filter(c=>["gold","silver","copper"].includes(c.id)).map(c=>
            <CotStack key={c.id} name={c.name} ncL={c.ncL} ncS={c.ncS} pct={c.pct}/>)}</Panel>
      </div>}

      {/* ENERGY */}
      {tab==="energy"&&<div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:7,animation:"fadeIn 0.3s"}}>
        <Panel title="CRUDE" glow>
          <Stat label="BRENT" value={a.brent} pct={a.brentPct} prefix="$" big/>
          <Stat label="WTI" value={a.wti} pct={a.wtiPct} prefix="$" big/>
          <Stat label="B-W Spread" value={a.bwS} prefix="$" big/><Stat label="Au/Oil" value={a.goR} dec={1}/></Panel>
        <Panel title="NATURAL GAS">
          <Stat label="NATGAS" value={a.natgas} pct={a.natgasPct} prefix="$" dec={3} big/>
          <Stat label="Oil/Gas" value={a.ogR} dec={1} big/></Panel>
        <Panel title="SUPPLY RISK" accent="#ff6b00">
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:3}}>
            {["strait_of_hormuz","red_sea","saudi_oil","libya_oil"].map(id=>{const z=zf(id);
              return <div key={id} style={{textAlign:"center",padding:"4px",background:z.fires>100?"rgba(255,0,106,0.05)":"rgba(0,10,25,0.2)",border:"1px solid "+(z.fires>100?"rgba(255,0,106,0.12)":"rgba(0,247,255,0.03)")}}>
                <div style={{fontSize:5.5,color:"#3a5a6b",letterSpacing:1}}>{id.replace(/_/g," ").toUpperCase().substring(0,10)}</div>
                <div style={{fontSize:14,color:z.fires>100?"#ff006a":z.fires>0?"#ffa040":"#0a1520",fontWeight:"bold"}}>{z.fires||"CLR"}</div>
                {z.high>0&&<div style={{fontSize:5.5,color:"#ff006a"}}>{z.high}H</div>}</div>;})}</div></Panel>
        <Panel title="ENERGY COT" span={2}>
          {a.cot.filter(c=>["wti","brent","natgas"].includes(c.id)).map(c=>
            <CotStack key={c.id} name={c.name} ncL={c.ncL} ncS={c.ncS} pct={c.pct}/>)}</Panel>
        <Panel title="CROSS-ASSET" accent="#ffd700">
          <Stat label="Au/Oil" value={a.goR} dec={1} big/><Stat label="VIX" value={a.vix} pct={a.vixPct}/></Panel>
        <Panel title="US INVENTORIES (EIA)" accent="#ff6b00" span={3}>
          <div style={{display:"flex",gap:6,flexWrap:"wrap",justifyContent:"center"}}>
            {[{k:"commercial_crude",l:"COMMERCIAL",u:"K bbl"},{k:"spr",l:"SPR",u:"K bbl"},{k:"cushing",l:"CUSHING",u:"K bbl"},
              {k:"crude_production",l:"PRODUCTION",u:"K/d"},{k:"crude_imports",l:"IMPORTS",u:"K/d"},{k:"refinery_inputs",l:"REFINERY",u:"K/d"}
            ].map(s=>{const d=a.oilInv?.[s.k];if(!d) return null;
              return <div key={s.k} style={{textAlign:"center",padding:"5px 10px",minWidth:80,background:"rgba(0,10,25,0.2)",border:"1px solid rgba(0,247,255,0.05)"}}>
                <div style={{fontSize:5.5,color:"#3a5a6b",letterSpacing:1}}>{s.l}</div>
                <div style={{fontSize:13,color:"#b0d4ea",fontWeight:"bold"}}>{(d.value/1000).toFixed(0)}M</div>
                {d.change!=null&&<div style={{fontSize:7,color:d.change>0?"#ff006a":"#00ff88"}}>{d.change>0?"+":""}{(d.change/1000).toFixed(1)}M</div>}
                <div style={{fontSize:5,color:"#1a3a4a"}}>{d.date}</div></div>;})}
            {a.oilInv?.days_of_supply!=null&&<div style={{textAlign:"center",padding:"5px 10px",minWidth:80,
              background:a.oilInv.days_of_supply<25?"rgba(255,0,106,0.06)":"rgba(0,10,25,0.2)",
              border:"1px solid "+(a.oilInv.days_of_supply<25?"rgba(255,0,106,0.12)":"rgba(0,247,255,0.05)")}}>
              <div style={{fontSize:5.5,color:"#3a5a6b",letterSpacing:1}}>DAYS SUPPLY</div>
              <div style={{fontSize:16,color:a.oilInv.days_of_supply<25?"#ff006a":"#00ff88",fontWeight:"bold"}}>{a.oilInv.days_of_supply}</div>
              <div style={{fontSize:5,color:"#1a3a4a"}}>days at current refinery rate</div></div>}
            {a.oilInv?.spr_commercial_pct!=null&&<div style={{textAlign:"center",padding:"5px 10px",minWidth:80,background:"rgba(0,10,25,0.2)",border:"1px solid rgba(0,247,255,0.05)"}}>
              <div style={{fontSize:5.5,color:"#3a5a6b",letterSpacing:1}}>SPR/COMM</div>
              <div style={{fontSize:16,color:"#b388ff",fontWeight:"bold"}}>{a.oilInv.spr_commercial_pct}%</div></div>}
          </div>
        </Panel>
      </div>}

      {/* RATES */}
      {tab==="rates"&&<div style={{display:"grid",gridTemplateColumns:"2fr 1fr",gap:7,animation:"fadeIn 0.3s"}}>
        <Panel title="US TREASURY CURVE" accent="#b388ff" glow>
          <YCurve y2={a.y2} y5={a.y5} y10={a.y10} y30={a.y30} be5={a.be5} be10={a.be10} r5={a.real5} r10={a.real10}/>
          <div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr 1fr",gap:4,marginTop:6}}>
            {[{l:"2s10s",v:a.s2s10},{l:"5s30s",v:a.s5s30},{l:"10s30s",v:a.s10s30},{l:"US-DE",v:a.usDeS}].map(s=>
              <div key={s.l} style={{textAlign:"center",background:"rgba(0,10,25,0.2)",padding:"3px",border:"1px solid "+((s.v||0)<0?"rgba(255,0,106,0.1)":"rgba(0,247,255,0.03)")}}>
                <div style={{fontSize:5.5,color:"#3a5a6b"}}>{s.l}</div>
                <div style={{fontSize:12,color:(s.v||0)<0?"#ff006a":"#b0d4ea",fontWeight:"bold"}}>{s.v}%</div></div>)}</div></Panel>
        <Panel title="10Y DECOMPOSITION" accent="#ffd700">
          <YieldDecomp nominal={a.y10} breakeven={a.be10} real={a.real10}/>
          <div style={{fontSize:7,color:"#3a5a6b",marginTop:3}}>Nominal = Inflation + Real</div></Panel>
        <Panel title="CREDIT">
          <Stat label="IG OAS" value={a.ig} suffix="%" big/><Stat label="HY OAS" value={a.hy} suffix="%" big/>
          <Stat label="HY-IG" value={a.hyIg} suffix="%" big/>
          <div style={{fontSize:7,color:a.hyIg>3?"#ff006a":"#3a5a6b",marginTop:3}}>{a.hyIg>3?"STRESS: HY diverging":"Credit stable"}</div></Panel>
        <Panel title="FUNDING">
          <Stat label="SOFR" value={a.sofr} suffix="%" big/><Stat label="EFFR" value={a.effr} suffix="%"/>
          <Stat label="SOFR-EFFR" value={a.sofrEffr} suffix="%" dec={3}/>
          <Stat label="German 10Y" value={a.de10} suffix="%"/><Stat label="US-DE" value={a.usDeS} suffix="%"/></Panel>
        <Panel title="BOND COT" span={2}>
          {a.cot.filter(c=>["ust_2y","ust_10y","vix"].includes(c.id)).map(c=>
            <CotStack key={c.id} name={c.name} ncL={c.ncL} ncS={c.ncS} pct={c.pct}/>)}</Panel>
        {a.indirectTrend?.avg_10_auction&&<Panel title="FOREIGN DEMAND (INDIRECT BIDS)" accent="#b388ff" span={2}>
          <div style={{display:"flex",gap:8,flexWrap:"wrap",justifyContent:"center",alignItems:"center"}}>
            <div style={{textAlign:"center",padding:"5px 12px"}}>
              <div style={{fontSize:5.5,color:"#3a5a6b",letterSpacing:1}}>10-AUCTION AVG</div>
              <div style={{fontSize:18,color:a.indirectTrend.signal==="WEAK_DEMAND"?"#ff006a":"#b0d4ea",fontWeight:"bold"}}>{a.indirectTrend.avg_10_auction}%</div></div>
            <div style={{textAlign:"center",padding:"5px 12px"}}>
              <div style={{fontSize:5.5,color:"#3a5a6b",letterSpacing:1}}>FULL AVG</div>
              <div style={{fontSize:14,color:"#5a8a9b"}}>{a.indirectTrend.avg_all}%</div></div>
            <div style={{textAlign:"center",padding:"5px 12px"}}>
              <div style={{fontSize:5.5,color:"#3a5a6b",letterSpacing:1}}>Z-SCORE</div>
              <div style={{fontSize:14,color:a.indirectTrend.z_score<-1?"#ff006a":a.indirectTrend.z_score>1?"#00ff88":"#5a8a9b",fontWeight:"bold"}}>{a.indirectTrend.z_score}</div></div>
            <div style={{textAlign:"center",padding:"5px 12px"}}>
              <div style={{fontSize:5.5,color:"#3a5a6b",letterSpacing:1}}>TREND</div>
              <div style={{fontSize:11,color:a.indirectTrend.trend==="declining"?"#ff006a":a.indirectTrend.trend==="rising"?"#00ff88":"#5a8a9b",fontWeight:"bold",letterSpacing:1}}>{a.indirectTrend.trend?.toUpperCase()}</div></div>
            <div style={{textAlign:"center",padding:"5px 12px",background:a.indirectTrend.signal==="WEAK_DEMAND"?"rgba(255,0,106,0.06)":"rgba(0,255,136,0.04)",border:"1px solid "+(a.indirectTrend.signal==="WEAK_DEMAND"?"rgba(255,0,106,0.15)":"rgba(0,247,255,0.05)"),minWidth:90}}>
              <div style={{fontSize:5.5,color:"#3a5a6b",letterSpacing:1}}>SIGNAL</div>
              <div style={{fontSize:11,color:a.indirectTrend.signal==="WEAK_DEMAND"?"#ff006a":"#00ff88",fontWeight:"bold"}}>{a.indirectTrend.signal}</div></div>
          </div>
          <div style={{fontSize:6,color:"#1a3a4a",marginTop:4,textAlign:"center"}}>Indirect bidders = foreign central bank proxy. Declining trend = petrodollar recycling slowdown.</div>
        </Panel>}
      </div>}

      {/* FX */}
      {tab==="fx"&&<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:7,animation:"fadeIn 0.3s"}}>
        <Panel title="DOLLAR" glow>
          <Stat label="DXY" value={a.dxy} pct={a.dxyPct} dec={3} big/>
          <div style={{fontSize:7,color:"#3a5a6b",marginTop:3}}>{a.dxy<100?"WEAK DOLLAR - supports commodities":"STRONG DOLLAR - risk headwind"}</div></Panel>
        <Panel title="CENTRAL BANKS" accent="#b388ff">
          <Stat label="PBOC Fix" value={a.pboc} dec={4} big/><Stat label="CNH Spread" value={a.cnyS} dec={4}/>
          {a.bojZ&&<div style={{fontSize:7,color:a.bojZ.includes("CRITICAL")?"#ff006a":"#3a5a6b",marginTop:2}}>BOJ: {a.bojZ}</div>}
          <Stat label="ECB Depo" value={a.ecbD} suffix="%"/><Stat label="ECB Refi" value={a.ecbR} suffix="%"/></Panel>
        <Panel title="FX SPOT + COT" span={2}>
          <div style={{display:"grid",gridTemplateColumns:"repeat(3,1fr)",gap:4}}>
            {[{n:"EUR/USD",v:a.eurusd,p:a.eurusdPct,c:a.cEur},{n:"USD/JPY",v:a.usdjpy,p:a.usdjpyPct,c:a.cJpy},
              {n:"GBP/USD",v:a.gbpusd,p:a.gbpusdPct,c:a.cGbp},{n:"AUD/USD",v:a.audusd,p:a.audusdPct,c:a.cAud},
              {n:"USD/CAD",v:a.usdcad,p:a.usdcadPct,c:a.cCad},{n:"USD/CHF",v:a.usdchf,p:a.usdchfPct,c:a.cChf}].map(f=>
              <div key={f.n} style={{background:"rgba(0,10,25,0.2)",padding:"5px 6px",border:"1px solid rgba(0,247,255,0.03)"}}>
                <div style={{display:"flex",justifyContent:"space-between",marginBottom:2}}>
                  <span style={{fontSize:7,color:"#00f7ff77"}}>{f.n}</span>
                  <span style={{fontSize:6,color:(f.c||0)>0?"#00ff88":"#ff006a"}}>{(f.c||0)>0?"LONG":"SHORT"} {f.c}%</span></div>
                <div style={{fontSize:13,color:"#b0d4ea"}}>{f.v?.toFixed(4)}</div>
                <div style={{fontSize:7,color:(f.p||0)>0?"#00ff88":"#ff006a"}}>{(f.p||0)>0?"+":""}{f.p?.toFixed(2)}%</div></div>)}</div></Panel>
        <Panel title="FX COT" span={2}>
          {a.cot.filter(c=>["eurusd","usdjpy","gbpusd","usdchf","audusd","usdcad"].includes(c.id)).map(c=>
            <CotStack key={c.id} name={c.name} ncL={c.ncL} ncS={c.ncS} pct={c.pct}/>)}</Panel>
        {Object.keys(a.swift).length>0&&<Panel title="SWIFT PAYMENT SHARE" accent="#b388ff" span={2}>
          <div style={{display:"flex",gap:6,flexWrap:"wrap",justifyContent:"center"}}>
            {["USD","EUR","GBP","JPY","CNY"].map(c=>{const v=a.swift[c];const t=a.swiftTrends[c];
              if(!v) return null;
              const col=c==="USD"?"#00f7ff":c==="CNY"?"#ff006a":c==="EUR"?"#ffd700":"#5a8a9b";
              return <div key={c} style={{textAlign:"center",padding:"5px 10px",minWidth:65,background:"rgba(0,10,25,0.2)",border:"1px solid "+col+"15"}}>
                <div style={{fontSize:7,color:col,fontWeight:"bold"}}>{c}</div>
                <div style={{fontSize:14,color:"#b0d4ea",fontWeight:"bold"}}>{v}%</div>
                {t&&<div style={{fontSize:6,color:t.direction==="rising"?"#00ff88":t.direction==="falling"?"#ff006a":"#3a5a6b"}}>{t.direction} ({t.change>0?"+":""}{t.change})</div>}
              </div>;})}
          </div>
        </Panel>}
      </div>}

      {/* RISK */}
      {tab==="risk"&&<div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:7,animation:"fadeIn 0.3s"}}>
        <Panel title="VOLATILITY" accent={a.vix>25?"#ff006a":"#00f7ff"} glow>
          <Stat label="VIX" value={a.vix} pct={a.vixPct} big accent={a.vix>25?"#ff006a":undefined}/>
          <Stat label="COT VIX" value={a.cVix} suffix="%"/>
          {a.percentiles?.vix!=null&&<div style={{fontSize:7,color:"#3a5a6b",marginTop:3}}>1Y Percentile: {a.percentiles.vix}%</div>}</Panel>
        <Panel title="EQUITIES">
          <Stat label="SPX" value={a.spx} pct={a.spxPct} dec={0} big/>
          <Stat label="NIKKEI" value={a.nikkei} pct={a.nikkeiPct} dec={0} big/>
          {a.percentiles?.spx!=null&&<div style={{fontSize:7,color:"#3a5a6b",marginTop:3}}>SPX 1Y Percentile: {a.percentiles.spx}%</div>}</Panel>
        <Panel title="REGIME RADAR"><Radar data={a.regime}/></Panel>
        <Panel title="CORRELATION SHIFTS" accent="#b388ff" glow span={2}>
          {a.correlations.slice(0,4).map((c,i)=>{const col=Math.abs(c.divergence)>0.3?"#ffd700":"#4a7a9b";
            return <div key={i} style={{display:"flex",justifyContent:"space-between",padding:"2px 0",fontSize:7}}>
              <span style={{color:"#5a8a9b"}}>{c.pair}</span>
              <span style={{color:col}}>{c.divergence>0?"+":""}{c.divergence} (1Y:{c.corr_1y} → 20d:{c.corr_20d})</span>
            </div>;})}
        </Panel>
        <Panel title="BOND COT" accent="#b388ff">
          {a.cot.filter(c=>["ust_2y","ust_10y"].includes(c.id)).map(c=>
            <CotStack key={c.id} name={c.name} ncL={c.ncL} ncS={c.ncS} pct={c.pct}/>)}</Panel>
      </div>}

      {/* CRYPTO */}
      {tab==="crypto"&&<div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:7,animation:"fadeIn 0.3s"}}>
        <Panel title="SENTIMENT" accent={a.fg<=20?"#ff006a":"#00f7ff"} glow>
          <FGGauge value={a.fg} label={a.fgL}/>
          <Spark data={a.fgH} label="7d" vKey="value" w={85} h={22}/>
          <div style={{fontSize:7,color:"#3a5a6b",marginTop:3}}>
            {a.fg<=15?"EXTREME FEAR - contrarian buy":a.fg<=25?"FEAR zone":a.fg>=75?"EXTREME GREED":"Neutral"}</div></Panel>
        <Panel title="BITCOIN">
          <Stat label="BTC Spot" value={a.btc} pct={a.btcPct} prefix="$" dec={0} big/>
          <Stat label="BTC Perp" value={a.perpBtc} prefix="$" dec={0}/>
          <Stat label="Basis" value={a.basis} suffix="%" dec={3} big/>
          <Stat label="ETH Perp" value={a.perpEth} prefix="$" dec={2}/></Panel>
        <Panel title="STRUCTURE" accent="#b388ff">
          <Stat label="Mcap" value={a.mcapT} prefix="$" suffix="T" big/>
          <Stat label="BTC Dom" value={a.btcDom} suffix="%" dec={1} big/>
          <Stat label="ETH Dom" value={a.ethDom} suffix="%" dec={1}/></Panel>
        <Panel title="STABLECOIN SUPPLY"><StableDonut stables={a.stables} total={a.stMcapB}/></Panel>
        <Panel title="DEFI" accent="#b388ff">
          <div style={{textAlign:"center",background:"rgba(0,10,25,0.2)",padding:"8px",border:"1px solid rgba(0,247,255,0.03)"}}>
            <div style={{fontSize:6,color:"#3a5a6b"}}>TVL</div>
            <div style={{fontSize:20,color:"#b388ff",fontWeight:"bold"}}>{"$"+a.tvlB+"B"}</div>
            <div style={{fontSize:7,color:a.tvlWk<-2?"#ff006a":"#3a5a6b"}}>7d: {a.tvlWk}%</div></div></Panel>
        <Panel title="ANALYSIS">
          <div style={{fontSize:7,color:"#5a8a9b",lineHeight:1.7}}>
            {a.fg<=20?"Fear extreme. ":(a.fg>=75?"Greed extreme. ":"")}
            {a.stMcapB>200?"$"+a.stMcapB+"B sidelined. ":""}
            {a.btcDom>55?"BTC dominant - risk-off crypto. ":""}</div></Panel>
      </div>}

      {/* GEO */}
      {tab==="geo"&&<div style={{display:"grid",gridTemplateColumns:"1fr 1fr",gap:7,animation:"fadeIn 0.3s"}}>
        <Panel title="THREAT LEVEL" accent="#ff6b00" glow span={2}>
          <div style={{display:"flex",gap:8,alignItems:"center",justifyContent:"center"}}>
            <div style={{textAlign:"center"}}><div style={{fontSize:5.5,color:"#3a5a6b"}}>TOTAL FIRES</div>
              <div style={{fontSize:20,color:a.totF>1000?"#ff006a":"#ffa040",fontWeight:"bold"}}>{a.totF}</div></div>
            <div style={{textAlign:"center"}}><div style={{fontSize:5.5,color:"#3a5a6b"}}>HIGH CONF</div>
              <div style={{fontSize:20,color:a.totH>50?"#ff006a":"#ffa040",fontWeight:"bold"}}>{a.totH}</div></div>
            <div style={{textAlign:"center"}}><div style={{fontSize:5.5,color:"#3a5a6b"}}>ZONES ACTIVE</div>
              <div style={{fontSize:20,color:"#b0d4ea",fontWeight:"bold"}}>{a.zones.filter(z=>z.fires>0).length}/{a.zones.length}</div></div>
          </div>
        </Panel>
        <Panel title="FIRMS SATELLITE" accent="#ff6b00" span={2}>
          <FireMap fires={a.fps} zones={a.zones}/></Panel>
        <Panel title="ZONES" accent="#ff6b00">
          {a.zones.map(z=><div key={z.id} style={{display:"flex",alignItems:"center",gap:4,padding:"1.5px 0"}}>
            <div style={{width:5,height:5,borderRadius:"50%",background:z.fires===0?"#0a1520":z.high>0?"#ff006a":"#ffa040",
              boxShadow:z.high>0?"0 0 4px #ff006a":"none",animation:z.high>0?"blink 1.5s infinite":"none"}}/>
            <span style={{flex:1,fontSize:7,color:z.fires===0?"#1a2a3a":"#5a8a9b"}}>{z.name.replace(/_/g," ")}</span>
            <span style={{fontSize:7,color:z.fires===0?"#0a1520":z.high>0?"#ff006a":"#7a8a4a"}}>{z.fires||"CLR"}{z.high>0&&<span style={{color:"#ff006a"}}> {z.high}H</span>}</span>
          </div>)}</Panel>
        <Panel title="PREDICTIONS">
          {a.poly.map((m,i)=><ProbBar key={i} question={m.question} prob={m.yes_probability}/>)}</Panel>
        <Panel title="SUPPLY RISK" accent="#ff6b00" span={2}>
          <div style={{display:"flex",gap:5,justifyContent:"center"}}>
            {["strait_of_hormuz","red_sea","saudi_oil","libya_oil"].map(id=>{const z=zf(id);
              return <div key={id} style={{textAlign:"center",padding:"5px 10px",minWidth:65,background:z.fires>100?"rgba(255,0,106,0.05)":"rgba(0,10,25,0.2)",
                border:"1px solid "+(z.fires>100?"rgba(255,0,106,0.12)":"rgba(0,247,255,0.03)")}}>
                <div style={{fontSize:6,color:"#3a5a6b",letterSpacing:1}}>{id.replace(/_/g," ").toUpperCase().substring(0,10)}</div>
                <div style={{fontSize:15,color:z.fires>100?"#ff006a":z.fires>0?"#ffa040":"#0a1520",fontWeight:"bold"}}>{z.fires||"CLR"}</div></div>;})}</div></Panel>
      </div>}

      {/* LIQUIDITY */}
      {tab==="liq"&&<div style={{display:"grid",gridTemplateColumns:"1fr 1fr 1fr",gap:7,animation:"fadeIn 0.3s"}}>
        <Panel title="NET LIQUIDITY" glow span={3}><LiqPipe bs={a.walclB} tga={a.tgaB} rrp={a.rrpB} net={a.netLiq}/></Panel>
        <Panel title="FED BS">
          <Stat label="Total" value={a.walclB} prefix="$" suffix="B" dec={0} big/><Stat label="Chg" value={a.bsChg} suffix="M" dec={0}/>
          <Stat label="Reserves" value={a.reserveBal} prefix="$" suffix="M" dec={0}/>
          <div style={{fontSize:7,color:a.bsChg<-10000?"#ff006a":"#3a5a6b",marginTop:3}}>{a.bsChg<-10000?"QT active":a.bsChg>10000?"EXPANDING":"Stable"}</div></Panel>
        <Panel title="TGA" accent="#ffd700">
          <Stat label="Balance" value={a.tgaB} prefix="$" suffix="B" dec={0} big/><Stat label="Chg" value={a.tgaChg} suffix="M" dec={0}/>
          <div style={{fontSize:7,color:a.tgaChg<-20000?"#00ff88":"#3a5a6b",marginTop:3}}>{a.tgaChg<-20000?"DRAWDOWN":a.tgaChg>20000?"BUILDING":"Stable"}</div></Panel>
        <Panel title="MONEY MARKETS">
          <Stat label="ON RRP" value={a.rrpB} prefix="$" suffix="B" big/><Stat label="SOFR" value={a.sofr} suffix="%" big/>
          <Stat label="EFFR" value={a.effr} suffix="%"/><Stat label="SOFR-EFFR" value={a.sofrEffr} suffix="%" dec={3}/></Panel>
        <Panel title="SUPPLY" accent="#b388ff">
          <Stat label="M2" value={a.m2} prefix="$" suffix="B" dec={1} big/>
          <Stat label="Unemployment" value={a.unemp} suffix="%"/><Stat label="Mortgage" value={a.mortgage} suffix="%"/></Panel>
        <Panel title="INTERPRETATION">
          <div style={{fontSize:7,color:"#5a8a9b",lineHeight:1.7}}>
            {a.netLiq>5500?"Net liq positive - risk-on. ":a.netLiq>0?"Net liq low. ":"Negative - headwind. "}
            {a.tgaChg<-20000?"TGA drawdown. ":""}
            {a.bsChg<-10000?"QT running. ":""}
            {(a.sofrEffr||0)>0.05?"Funding stress. ":""}</div></Panel>
      </div>}
    </div>
    <style>{["@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}",
      "@keyframes alertPulse{0%,100%{border-color:rgba(255,0,106,0.1)}50%{border-color:rgba(255,0,106,0.3)}}",
      "@keyframes blink{0%,100%{opacity:1}50%{opacity:0.25}}"].join("")}</style>
  </div>;
};

// ═══ APP (auto-fetches from API, skips file upload step) ═══
window.CipherPortal = function CipherPortal() {
  const [phase,setPhase]=useState("auth");
  const [analytics,setAnalytics]=useState(null);

  // Auto-load from API data when entering dash phase
  useEffect(()=>{
    if(phase==="dash" && !analytics && window.__CIPHER_BRIEFING__) {
      setAnalytics(compute(window.__CIPHER_BRIEFING__));
    }
  },[phase]);

  const handleFile = (e) => {
    const file=e.target.files[0];if(!file) return;
    const reader=new FileReader();
    reader.onload=(ev)=>{try{setAnalytics(compute(JSON.parse(ev.target.result)));}catch(err){console.error(err);}};
    reader.readAsText(file);
  };

  if(phase==="auth") return <PwGate onAuth={()=>setPhase("boot")}/>;
  if(phase==="boot") return <Boot onDone={()=>setPhase("dash")}/>;
  if(!analytics) return <div style={{position:"fixed",inset:0,background:"#030810",display:"flex",alignItems:"center",justifyContent:"center",flexDirection:"column",gap:12,fontFamily:"monospace"}}>
    <Bg/><div style={{position:"relative",zIndex:10,textAlign:"center"}}>
      <div style={{fontSize:12,letterSpacing:4,color:"#00f7ff",marginBottom:5}}>CIPHER</div>
      <div style={{fontSize:7,color:"#1a4a6a",marginBottom:16}}>Upload briefing JSON</div>
      <label style={{border:"1px solid rgba(0,247,255,0.1)",padding:"8px 20px",cursor:"pointer",fontSize:7,letterSpacing:2,color:"#00f7ff"}}>
        LOAD BRIEFING<input type="file" accept=".json" onChange={handleFile} style={{display:"none"}}/></label></div></div>;
  return <Dash a={analytics}/>;
};
</script>

</body>
</html>
