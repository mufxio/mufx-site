<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CIPHER — muFX Intelligence Terminal</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" type="image/svg+xml" href="/mufx-favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500&family=DM+Sans:opsz,wght@9..40,200;9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<style>
:root{--bg:#060608;--bg-card:#0c0c12;--bg-el:#10101a;--cyan:#00b4f0;--cyan-dim:rgba(0,180,240,0.15);--cyan-ghost:rgba(0,180,240,0.06);--teal:#4ecdc4;--gold:#f7b731;--pink:#e056a0;--text:#c8d0d8;--text-dim:rgba(200,210,220,0.45);--text-ghost:rgba(200,210,220,0.2);--border:rgba(0,180,240,0.08);--mono:'JetBrains Mono',monospace;--sans:'DM Sans',sans-serif}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.04) 2px,rgba(0,0,0,0.04) 4px);pointer-events:none;z-index:1000}
.cipher-loading{display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:16px;font-family:var(--mono)}
.cipher-loading .spinner{width:20px;height:20px;border:2px solid var(--cyan-ghost);border-top-color:var(--cyan);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.cipher-loading .status{font-size:10px;letter-spacing:4px;color:var(--text-ghost)}
.cipher-error{display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:20px;font-family:var(--mono)}
.cipher-error .msg{font-size:11px;color:var(--pink);letter-spacing:3px}
.cipher-error .hint{font-size:9px;color:var(--text-ghost)}
.cipher-error button{background:none;border:1px solid var(--border);color:var(--cyan);padding:10px 24px;font-family:var(--mono);font-size:9px;letter-spacing:2px;cursor:pointer;transition:all .2s}
.cipher-error button:hover{background:var(--cyan-ghost)}
.pw-gate{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;font-family:var(--mono);z-index:100}
.pw-gate .title{font-size:11px;letter-spacing:6px;color:var(--cyan);opacity:.5;margin-bottom:8px}
.pw-gate .subtitle{font-size:8px;letter-spacing:3px;color:var(--text-ghost);margin-bottom:32px}
.pw-gate input{background:transparent;border:1px solid var(--border);color:var(--cyan);padding:10px 16px;font-size:11px;letter-spacing:4px;text-align:center;width:220px;outline:none;font-family:var(--mono);transition:border-color .2s}
.pw-gate input:focus{border-color:var(--cyan-dim)}
.pw-gate input::placeholder{color:var(--text-ghost);letter-spacing:2px;font-size:9px}
.pw-gate .btn{display:block;margin:12px auto 0;background:transparent;border:1px solid rgba(0,180,240,0.05);color:var(--text-ghost);padding:6px 20px;font-size:8px;letter-spacing:3px;cursor:pointer;font-family:var(--mono);transition:all .2s}
.pw-gate .btn:hover{color:var(--cyan);border-color:var(--border)}
.shake{animation:shake .4s}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
.boot{position:fixed;inset:0;background:var(--bg);font-family:var(--mono);padding:32px;display:flex;flex-direction:column;z-index:90;transition:opacity .5s}
.boot-line{font-size:11px;line-height:1.8}
.boot-bar{height:2px;background:rgba(0,180,240,0.05)}
.boot-bar-fill{height:100%;width:0%;background:linear-gradient(90deg,var(--cyan),var(--teal));transition:width .15s}
.boot-pct{display:flex;justify-content:space-between;font-size:8px;margin-bottom:4px}
.boot-pct .l{color:var(--text-ghost);letter-spacing:2px}.boot-pct .r{color:var(--cyan)}
.cipher-shell{max-width:1400px;margin:0 auto;padding:12px 16px;min-height:100vh}
.cipher-header{display:flex;justify-content:space-between;align-items:center;padding:8px 0 10px;border-bottom:1px solid var(--border);margin-bottom:12px}
.cipher-brand{display:flex;align-items:center;gap:10px}
.cipher-brand .name{font-family:var(--mono);font-size:13px;letter-spacing:6px;color:var(--cyan);font-weight:500}
.cipher-brand .sub{font-family:var(--mono);font-size:7px;letter-spacing:3px;color:var(--text-ghost);text-transform:uppercase}
.cipher-meta{display:flex;align-items:center;gap:12px}
.cipher-clock{font-family:var(--mono);font-size:11px;letter-spacing:2px;color:var(--cyan)}
.cipher-date{font-family:var(--mono);font-size:8px;color:var(--text-ghost);letter-spacing:1px}
.cipher-pulse{width:6px;height:6px;border-radius:50%;background:var(--teal);box-shadow:0 0 6px var(--teal);animation:pulse 3s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:.4;box-shadow:0 0 4px rgba(78,205,196,0.2)}50%{opacity:1;box-shadow:0 0 12px rgba(78,205,196,0.5)}}
.cipher-tabs{display:flex;gap:0;margin-bottom:14px;border-bottom:1px solid var(--border);overflow-x:auto}
.cipher-tabs button{background:transparent;border:none;border-bottom:2px solid transparent;color:var(--text-ghost);padding:8px 14px;font-family:var(--mono);font-size:9px;letter-spacing:2px;cursor:pointer;white-space:nowrap;transition:all .2s;text-transform:uppercase}
.cipher-tabs button:hover{color:var(--text-dim)}
.cipher-tabs button.active{color:var(--cyan);border-bottom-color:var(--cyan);background:var(--cyan-ghost)}
.panel{background:var(--bg-card);border:1px solid var(--border);border-radius:4px;padding:14px 16px;position:relative;overflow:hidden}
.panel.glow{box-shadow:inset 0 0 20px rgba(0,180,240,0.02)}
.panel.alert{animation:alertPulse 2s infinite}
@keyframes alertPulse{0%,100%{border-color:var(--border)}50%{border-color:rgba(224,86,160,0.2)}}
.panel-title{display:flex;align-items:center;gap:6px;margin-bottom:10px}
.panel-title .diamond{width:4px;height:4px;clip-path:polygon(50% 0%,100% 50%,50% 100%,0% 50%);opacity:.6}
.panel-title .label{font-family:var(--mono);font-size:8px;letter-spacing:2.5px;text-transform:uppercase;opacity:.6}
.panel-title .line{flex:1;height:1px;background:linear-gradient(to right,rgba(0,180,240,0.08),transparent)}
.stat-row{display:flex;justify-content:space-between;align-items:baseline;padding:2px 0;border-bottom:1px solid rgba(0,180,240,0.02)}
.stat-row.big{padding:3px 0}
.stat-label{font-family:var(--mono);font-size:8px;color:var(--text-ghost);letter-spacing:1px}
.stat-row.big .stat-label{font-size:9px}
.stat-value{font-family:var(--mono);font-size:10px;color:var(--text);letter-spacing:.5px}
.stat-row.big .stat-value{font-size:13px;font-weight:500}
.stat-pct{font-family:var(--mono);font-size:8px;margin-left:8px;min-width:42px;text-align:right}
.stat-pct.up{color:var(--teal)}.stat-pct.down{color:var(--pink)}.stat-pct.flat{color:var(--text-ghost)}
.intel-summary{display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.intel-stat{background:var(--bg-card);border:1px solid var(--border);border-radius:4px;padding:10px 16px;text-align:center;min-width:100px;flex:1}
.intel-stat .n{font-family:var(--mono);font-size:22px;font-weight:500}
.intel-stat .n.critical{color:var(--pink)}.intel-stat .n.high{color:var(--gold)}.intel-stat .n.teal{color:var(--teal)}.intel-stat .n.cyan{color:var(--cyan)}
.intel-stat .l{font-family:var(--mono);font-size:7px;letter-spacing:2px;color:var(--text-ghost);text-transform:uppercase;margin-top:2px}
.thread-card{border:1px solid var(--border);border-radius:4px;background:var(--bg-card);padding:16px 18px;margin-bottom:8px;position:relative;overflow:hidden}
.thread-card::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;border-radius:2px 0 0 2px}
.thread-card.critical::before{background:linear-gradient(180deg,var(--pink),var(--gold))}
.thread-card.high::before{background:linear-gradient(180deg,var(--gold),var(--cyan))}
.thread-sev{font-family:var(--mono);font-size:7px;letter-spacing:2px;text-transform:uppercase;margin-bottom:4px}
.thread-card.critical .thread-sev{color:var(--pink)}.thread-card.high .thread-sev{color:var(--gold)}
.thread-title{font-family:var(--sans);font-size:16px;font-weight:500;color:var(--text);margin-bottom:6px}
.thread-summary{font-family:var(--sans);font-size:13px;font-weight:300;color:var(--text-dim);line-height:1.7;margin-bottom:8px}
.thread-evidence .ev{font-family:var(--mono);font-size:9px;color:var(--text-dim);padding-left:10px;position:relative;margin-bottom:2px}
.thread-evidence .ev::before{content:'\25B8';position:absolute;left:0;color:var(--cyan);opacity:.4}
.tripwire-row{display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(--bg-card);border:1px solid var(--border);border-radius:4px;margin-bottom:4px}
.tripwire-light{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.tripwire-light.triggered{background:var(--pink);box-shadow:0 0 8px rgba(224,86,160,0.5);animation:blink 1.5s infinite}
.tripwire-light.warning{background:var(--gold);box-shadow:0 0 6px rgba(247,183,49,0.3)}
.tripwire-light.clear{background:rgba(78,205,196,0.15);border:1px solid rgba(78,205,196,0.2)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.tripwire-info{flex:1}
.tripwire-name{font-family:var(--mono);font-size:9px;letter-spacing:1px;color:var(--text)}
.tripwire-detail{font-family:var(--sans);font-size:10px;font-weight:300;color:var(--text-dim)}
.tripwire-value{font-family:var(--mono);font-size:11px;font-weight:500;min-width:60px;text-align:right}
.tripwire-row.triggered .tripwire-value{color:var(--pink)}
.tripwire-row.warning .tripwire-value{color:var(--gold)}
.tripwire-row.clear .tripwire-value{color:var(--teal);opacity:.5}
.priority-item{display:flex;gap:12px;padding:12px 14px;background:var(--bg-card);border:1px solid var(--border);border-radius:4px;margin-bottom:6px;border-left:3px solid transparent}
.priority-item.critical{border-left-color:var(--pink)}.priority-item.high{border-left-color:var(--gold)}
.priority-item .sev-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:4px}
.priority-item.critical .sev-dot{background:var(--pink);box-shadow:0 0 6px rgba(224,86,160,0.4)}
.priority-item.high .sev-dot{background:var(--gold);box-shadow:0 0 6px rgba(247,183,49,0.3)}
.priority-item .type-tag{font-family:var(--mono);font-size:7px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-ghost);margin-bottom:2px}
.priority-item .title{font-family:var(--sans);font-size:13px;font-weight:500;color:var(--text);margin-bottom:4px}
.priority-item .detail{font-family:var(--sans);font-size:12px;font-weight:300;color:var(--text-dim);line-height:1.6}
.priority-item .evidence{margin-top:6px;display:flex;flex-wrap:wrap;gap:4px}
.priority-item .chip{font-family:var(--mono);font-size:8px;padding:2px 8px;border-radius:2px;background:var(--cyan-ghost);border:1px solid var(--border);color:var(--text-dim)}
.section-head{font-family:var(--mono);font-size:8px;letter-spacing:3px;text-transform:uppercase;color:var(--text-ghost);margin:16px 0 8px;display:flex;align-items:center;gap:8px}
.section-head::after{content:'';flex:1;height:1px;background:linear-gradient(to right,var(--border),transparent)}
.delta-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:6px}
.delta-card{background:var(--bg-card);border:1px solid var(--border);border-radius:4px;padding:10px 12px;text-align:center}
.delta-asset{font-family:var(--mono);font-size:7px;letter-spacing:2px;color:var(--text-ghost);text-transform:uppercase;margin-bottom:4px}
.delta-pct{font-family:var(--mono);font-size:16px;font-weight:500}
.delta-pct.up{color:var(--teal)}.delta-pct.down{color:var(--pink)}
.delta-abs{font-family:var(--mono);font-size:8px;color:var(--text-ghost);margin-top:2px}
.cot-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:4px}
.cot-cell{padding:4px 6px;text-align:center;border-radius:2px}
.cot-cell .name{font-family:var(--mono);font-size:7px;color:var(--text-dim)}
.cot-cell .pct{font-family:var(--mono);font-size:13px;font-weight:500}
.cot-cell .oi{font-family:var(--mono);font-size:6px;color:var(--text-ghost)}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.grid-2{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.span-2{grid-column:span 2}.span-3{grid-column:span 3}.span-4{grid-column:span 4}
@media(max-width:900px){.grid-4{grid-template-columns:repeat(2,1fr)}.span-4,.span-3{grid-column:span 2}}
@media(max-width:600px){.grid-4,.grid-3,.grid-2{grid-template-columns:1fr}.span-2,.span-3,.span-4{grid-column:span 1}.cipher-header{flex-direction:column;gap:8px;text-align:center}.intel-summary{flex-direction:column}}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
/* ═══ AMBIENT STATE ═══ */
body[data-cipher-state="CALM"]{border-top:2px solid rgba(139,148,158,0.15)}
body[data-cipher-state="ALERT"]{border-top:2px solid rgba(247,183,49,0.4)}
body[data-cipher-state="ELEVATED"]{border-top:2px solid rgba(224,144,64,0.6)}
body[data-cipher-state="CRITICAL"]{border-top:2px solid rgba(224,86,160,0.8);box-shadow:inset 0 0 80px rgba(224,86,160,0.02)}
body[data-cipher-state="STORM"]{border-top:2px solid rgba(255,34,34,1);box-shadow:inset 0 0 80px rgba(255,34,34,0.03);animation:stormAmbient 4s ease-in-out infinite}
@keyframes stormAmbient{0%,100%{box-shadow:inset 0 0 60px rgba(255,34,34,0.02)}50%{box-shadow:inset 0 0 120px rgba(255,34,34,0.05)}}
/* ═══ CIPHER EYE ═══ */
.cipher-eye{width:18px;height:18px;border-radius:50%;position:relative;flex-shrink:0;transition:all 0.5s}
.cipher-eye::after{content:'';position:absolute;top:50%;left:50%;width:6px;height:6px;border-radius:50%;transform:translate(-50%,-50%);background:currentColor;box-shadow:0 0 8px currentColor;transition:all 0.5s}
.cipher-eye[data-state="CALM"]{color:#8B949E;border:1.5px solid rgba(139,148,158,0.3)}
.cipher-eye[data-state="ALERT"]{color:#F7B731;border:1.5px solid rgba(247,183,49,0.4);animation:eyePulse 2.5s ease-in-out infinite}
.cipher-eye[data-state="ELEVATED"]{color:#E09040;border:1.5px solid rgba(224,144,64,0.5);animation:eyePulse 1.5s ease-in-out infinite}
.cipher-eye[data-state="CRITICAL"]{color:#E056A0;border:1.5px solid rgba(224,86,160,0.6);animation:eyePulse 0.8s ease-in-out infinite}
.cipher-eye[data-state="STORM"]{color:#FF2222;border:1.5px solid rgba(255,34,34,0.7);animation:eyePulse 0.4s ease-in-out infinite;box-shadow:0 0 12px rgba(255,34,34,0.3)}
@keyframes eyePulse{0%,100%{opacity:0.7;transform:scale(1)}50%{opacity:1;transform:scale(1.1)}}
/* ═══ TAB CONTEXT BAR ═══ */
.tab-ctx{display:flex;align-items:center;gap:8px;padding:7px 12px;margin-bottom:10px;background:rgba(12,12,18,0.8);border:1px solid var(--border);border-radius:4px;border-left:3px solid var(--cyan);overflow-x:auto;animation:fadeIn 0.3s}
.tab-ctx .ctx-wire{width:7px;height:7px;border-radius:50%;flex-shrink:0;transition:all 0.3s}
.tab-ctx .ctx-regime{font-family:var(--mono);font-size:7px;letter-spacing:1.5px;padding:2px 8px;border-radius:2px;background:rgba(0,180,240,0.06);border:1px solid var(--border);color:var(--cyan);white-space:nowrap;flex-shrink:0}
.tab-ctx .ctx-div{font-family:var(--mono);font-size:7px;padding:2px 7px;border-radius:2px;white-space:nowrap;cursor:pointer;transition:all 0.2s;flex-shrink:0}
.tab-ctx .ctx-div:hover{filter:brightness(1.3)}
.tab-ctx .ctx-div.critical{background:rgba(224,86,160,0.06);border:1px solid rgba(224,86,160,0.12);color:var(--pink)}
.tab-ctx .ctx-div.high{background:rgba(247,183,49,0.06);border:1px solid rgba(247,183,49,0.1);color:var(--gold)}
.tab-ctx .ctx-div.warning{background:rgba(78,205,196,0.06);border:1px solid rgba(78,205,196,0.1);color:var(--teal)}
.tab-ctx .ctx-whisper{font-family:var(--sans);font-size:10px;font-weight:300;color:var(--text-dim);font-style:italic;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tab-ctx .ctx-links{display:flex;align-items:center;gap:3px;font-family:var(--mono);font-size:7px;color:var(--text-ghost);flex-shrink:0}
</style>
</head>
<body>
<div id="cipher-root"><div class="cipher-loading"><div class="spinner"></div><div class="status">CONNECTING TO CIPHER</div></div></div>
<input type="file" id="fallback-upload" accept=".json" style="display:none">
<script src="https://cdnjs.cloudflare.com/ajax/libs/react/18.2.0/umd/react.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/react-dom/18.2.0/umd/react-dom.production.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/babel-standalone/7.23.9/babel.min.js"></script>
<script src="https://unpkg.com/lightweight-charts@4.1.3/dist/lightweight-charts.standalone.production.js"></script>
<script>
const CIPHER_API='https://api.mufx.io',PW='kova2026';
async function fetchJSON(p){try{const r=await fetch(CIPHER_API+p);if(!r.ok)throw new Error(r.status);return await r.json()}catch(e){console.error(p,e);return null}}
async function boot(){const[briefing,intel,narrative,identity,history,operator]=await Promise.all([
fetchJSON('/api/briefing/latest'),fetchJSON('/api/intel'),
fetchJSON('/api/narrative'),fetchJSON('/api/identity'),fetchJSON('/api/history'),fetchJSON('/api/operator')]);
if(briefing){window.__CIPHER__={briefing,intel,narrative,identity,history,operator};ReactDOM.render(React.createElement(window.CipherApp),document.getElementById('cipher-root'))}
else{document.getElementById('cipher-root').innerHTML='<div class="cipher-error"><div class="msg">CIPHER API UNREACHABLE</div><div class="hint">Could not connect</div><button onclick="document.getElementById(\'fallback-upload\').click()">UPLOAD JSON</button><button onclick="location.reload()">RETRY</button></div>';
document.getElementById('fallback-upload').onchange=e=>{const f=e.target.files[0];if(!f)return;const r=new FileReader();r.onload=ev=>{try{window.__CIPHER__={briefing:JSON.parse(ev.target.result),intel:null,narrative:null,identity:null,history:null,operator:null};ReactDOM.render(React.createElement(window.CipherApp),document.getElementById('cipher-root'))}catch(err){console.error(err)}};r.readAsText(f)}}}
window.addEventListener('DOMContentLoaded',boot);
</script>
<script type="text/babel">
const{useState,useEffect,useRef}=React;

/* ═══ HELPERS ═══ */
const timeAgo=(iso)=>{if(!iso)return null;const d=new Date(iso),now=new Date(),sec=Math.max(0,Math.floor((now-d)/1000));if(sec<60)return"just now";const min=Math.floor(sec/60);if(min<60)return min+"m ago";const hr=Math.floor(min/60);if(hr<24)return hr+"h ago";const day=Math.floor(hr/24);return day+"d ago"};
const isStale=(iso,hours=24)=>{if(!iso)return false;return(new Date()-new Date(iso))/(1e3*60*60)>hours};

/* ═══ COMPUTE ═══ */
const compute=(b)=>{
if(!b?.derivatives)return null;
const dv=b.derivatives,sp=dv.spot||{},ch=dv.changes_pct||{},fr=dv.fred||{},
ct=dv.cot||{},cr=dv.crypto||{},ph=dv.physical||{},cb=dv.central_banks||{},
pc=dv.percentiles||{},zs=dv.zscores||{};
const vix=sp.vix||0;
const rv=Math.min(vix/40*100,100),rc=Math.min((fr.hy_oas||0)/6*100,100),
rg=Math.min(Math.abs(ch.gold||0)/5*100,100),ro=Math.min(Math.abs(ch.brent||0)/8*100,100),
rf=Math.min(Math.abs(ch.dxy||0)/2*100,100),re=Math.min(((vix>20?50:0)+Math.abs(ch.gold||0)*10)/100*100,100);
const cotArr=Object.entries(ct).map(([k,v])=>({id:k,name:k.replace(/_/g," ").toUpperCase(),pct:v.net_pct_oi,oi:v.oi,net:v.net,ncL:v.long,ncS:v.short})).sort((a,b)=>Math.abs(b.pct)-Math.abs(a.pct));
const stables=Object.entries(cr.stables||{}).map(([k,v])=>({name:k,mcap:v})).sort((a,b)=>b.mcap-a.mcap);
const fps=[];Object.entries(b.pipes?.firms?.data||{}).forEach(([zone,data])=>{if(data?.fires)data.fires.forEach(f=>{fps.push({zone,lat:f.latitude||f.lat,lon:f.longitude||f.lon,brightness:f.brightness,conf:f.confidence,frp:f.frp})})});

const Stat=({label,value,pct,prefix="",suffix="",dec=2,big,accent})=>{

const pts=vals.map((v,i)=>(i/(vals.length-1))*w+","+(h-2-((v-mn)/rng)*(h-6))).join(" ");

const Radar=({data})=>{const ax=[{k:"vol",l:"VOL",c:"#e056a0"},{k:"credit",l:"CREDIT",c:"#f7b731"},{k:"gold",l:"GOLD",c:"#f7b731"},{k:"oil",l:"OIL",c:"#00b4f0"},{k:"fx",l:"FX",c:"#b388ff"},{k:"geo",l:"GEO",c:"#4ecdc4"}];const cx=82,cy=78,r=58,n=ax.length;const ang=i=>(Math.PI*2*i/n)-Math.PI/2;const pt=(i,p)=>[cx+Math.cos(ang(i))*r*p/100,cy+Math.sin(ang(i))*r*p/100];const dp=ax.map((a,i)=>pt(i,data[a.k]||0)).map((p,i)=>(i===0?"M":"L")+p[0]+" "+p[1]).join(" ")+"Z";const avg=ax.reduce((s,a)=>s+(data[a.k]||0),0)/n;const ac=avg>60?"#e056a0":avg>35?"#f7b731":"#4ecdc4";return<svg width="164" height="160" viewBox="0 0 164 160">{[25,50,75,100].map(p=><polygon key={p} points={ax.map((_,i)=>pt(i,p).join(",")).join(" ")} fill="none" stroke="rgba(0,180,240,0.06)" strokeWidth={p===50?"0.5":"0.25"}/>)}{ax.map((_,i)=><line key={i} x1={cx} y1={cy} x2={pt(i,100)[0]} y2={pt(i,100)[1]} stroke="rgba(0,180,240,0.04)" strokeWidth="0.25"/>)}<path d={dp} fill="rgba(0,180,240,0.04)" stroke={ac} strokeWidth="1.4" opacity="0.65"/>{ax.map((a,i)=>{const[px,py]=pt(i,data[a.k]||0);const[lx,ly]=pt(i,118);return<g key={a.k}><circle cx={px} cy={py} r="2.5" fill={a.c} opacity="0.65"/><text x={lx} y={ly+3} textAnchor="middle" fill={a.c} fontSize="6.5" opacity="0.6" fontFamily="var(--mono)">{a.l}</text><text x={lx} y={ly+12} textAnchor="middle" fill="var(--text-ghost)" fontSize="7.5" fontFamily="var(--mono)">{Math.round(data[a.k]||0)}</text></g>})}<text x={cx} y={cy+4} textAnchor="middle" fill={ac} fontSize="14" fontWeight="bold" fontFamily="var(--mono)">{Math.round(avg)}</text><text x={cx} y={cy+13} textAnchor="middle" fill="var(--text-ghost)" fontSize="6" fontFamily="var(--mono)">STRESS</text></svg>};

const YCurve=({y2,y5,y10,y30,be5,be10,r5,r10})=>{if(!y2)return null;const W=300,H=100,pad=26;const pts=[{t:"2Y",v:y2},{t:"5Y",v:y5},{t:"10Y",v:y10},{t:"30Y",v:y30}];const all=[...pts.map(p=>p.v),be5,be10,r5,r10].filter(Boolean);const mn=Math.min(...all)-0.3,mx=Math.max(...all)+0.3;const sy=v=>H-pad-(v-mn)/(mx-mn)*(H-2*pad);const xs=pts.map((_,i)=>pad+i*(W-2*pad)/(pts.length-1));const np=pts.map((p,i)=>(i===0?"M":"L")+xs[i]+" "+sy(p.v)).join(" ");return<svg width={W} height={H} viewBox={"0 0 "+W+" "+H} style={{display:"block",margin:"0 auto"}}><path d={np} fill="none" stroke="var(--cyan)" strokeWidth="1.8" opacity="0.7"/>{pts.map((p,i)=><g key={i}><circle cx={xs[i]} cy={sy(p.v)} r="3" fill="var(--bg)" stroke="var(--cyan)" strokeWidth="1.3"/><text x={xs[i]} y={sy(p.v)-8} textAnchor="middle" fill="var(--text)" fontSize="9" fontWeight="500" fontFamily="var(--mono)">{p.v}%</text><text x={xs[i]} y={H-6} textAnchor="middle" fill="var(--text-ghost)" fontSize="7" fontFamily="var(--mono)">{p.t}</text></g>)}{[{v:be5,x:xs[1]},{v:be10,x:xs[2]}].filter(p=>p.v).map((p,i)=><g key={"b"+i}><circle cx={p.x} cy={sy(p.v)} r="2.5" fill="var(--gold)" opacity="0.5"/><text x={p.x+(i===0?-10:10)} y={sy(p.v)+3} textAnchor={i===0?"end":"start"} fill="var(--gold)" fontSize="6" opacity="0.6" fontFamily="var(--mono)">{p.v}%</text></g>)}{[{v:r5,x:xs[1]},{v:r10,x:xs[2]}].filter(p=>p.v).map((p,i)=><g key={"r"+i}><circle cx={p.x} cy={sy(p.v)} r="2.5" fill="var(--teal)" opacity="0.5"/><text x={p.x+(i===0?-10:10)} y={sy(p.v)+3} textAnchor={i===0?"end":"start"} fill="var(--teal)" fontSize="6" opacity="0.6" fontFamily="var(--mono)">{p.v}%</text></g>)}</svg>};

const FireMap=({fires,zones})=>{
const canvasRef=useRef(null),animRef=useRef(null);
const[hover,setHover]=useState(null);
const zonePosRef=useRef([]);
useEffect(()=>{const c=canvasRef.current;if(!c)return;const ctx=c.getContext("2d");const dpr=window.devicePixelRatio||1,rect=c.getBoundingClientRect();c.width=rect.width*dpr;c.height=rect.height*dpr;ctx.scale(dpr,dpr);const w=rect.width,h=rect.height;
const proj=(lat,lon)=>{const x=((lon+180)/360)*w;const lr=lat*Math.PI/180;const y=(h/2)-(w*Math.log(Math.tan(Math.PI/4+lr/2)))/(2*Math.PI);return[x,y]};
const zc={strait_of_hormuz:[26,56],red_sea:[15,40],iran:[32,53],israel_lebanon:[33,35],ukraine:[49,32],taiwan_strait:[24,120],saudi_oil:[24,46],libya_oil:[28,18]};
const shortNames={strait_of_hormuz:"HORMUZ",red_sea:"RED SEA",iran:"IRAN",israel_lebanon:"ISR/LBN",ukraine:"UKRAINE",taiwan_strait:"TAIWAN",saudi_oil:"SAUDI",libya_oil:"LIBYA"};
/* compute label positions with collision nudge */
const labels=[];zones.forEach(z=>{const center=zc[z.id];if(!center||z.fires===0)return;const[x,y]=proj(center[0],center[1]);labels.push({id:z.id,name:z.name,short:shortNames[z.id]||z.id.toUpperCase(),fires:z.fires,high:z.high,cx:x,cy:y,lx:x+10,ly:y-2})});
for(let i=0;i<labels.length;i++){for(let j=i+1;j<labels.length;j++){const dx=Math.abs(labels[i].lx-labels[j].lx),dy=Math.abs(labels[i].ly-labels[j].ly);if(dx<55&&dy<12){labels[j].ly+=14}}}
zonePosRef.current=labels;
let frame=0;
const tick=()=>{frame++;ctx.fillStyle="#060608";ctx.fillRect(0,0,w,h);ctx.strokeStyle="rgba(0,180,240,0.015)";ctx.lineWidth=0.3;for(let la=-60;la<=80;la+=15){const[,y]=proj(la,0);ctx.beginPath();ctx.moveTo(0,y);ctx.lineTo(w,y);ctx.stroke()}for(let lo=-180;lo<=180;lo+=20){const[x]=proj(0,lo);ctx.beginPath();ctx.moveTo(x,0);ctx.lineTo(x,h);ctx.stroke()}
fires.forEach((f,i)=>{const[x,y]=proj(f.lat,f.lon);if(x<-10||x>w+10||y<-10||y>h+10)return;const isH=f.conf==="h"||f.conf==="high",pulse=Math.sin(frame*0.04+i*0.7)*0.3+0.7,sz=isH?3.5:1.8;const grad=ctx.createRadialGradient(x,y,0,x,y,sz*5);grad.addColorStop(0,isH?"rgba(224,86,160,"+(0.3*pulse)+")":"rgba(247,183,49,"+(0.12*pulse)+")");grad.addColorStop(1,"transparent");ctx.fillStyle=grad;ctx.fillRect(x-sz*5,y-sz*5,sz*10,sz*10);ctx.beginPath();ctx.arc(x,y,sz*pulse,0,Math.PI*2);ctx.fillStyle=isH?"rgba(224,86,160,"+(0.7*pulse)+")":"rgba(247,183,49,"+(0.4*pulse)+")";ctx.fill()});
/* zone labels with collision-free positions */
ctx.font="7px 'JetBrains Mono',monospace";
labels.forEach(lb=>{
ctx.beginPath();ctx.arc(lb.cx,lb.cy,4,0,Math.PI*2);ctx.fillStyle=lb.high>0?"rgba(224,86,160,0.7)":"rgba(247,183,49,0.5)";ctx.fill();
ctx.strokeStyle="rgba(0,180,240,0.08)";ctx.beginPath();ctx.moveTo(lb.cx,lb.cy);ctx.lineTo(lb.lx,lb.ly);ctx.stroke();
ctx.fillStyle=lb.high>0?"rgba(224,86,160,0.65)":"rgba(247,183,49,0.45)";ctx.fillText(lb.short,lb.lx,lb.ly);
ctx.fillStyle="rgba(0,180,240,0.35)";ctx.fillText(lb.fires+(lb.high>0?" | "+lb.high+"H":""),lb.lx,lb.ly+10)});
animRef.current=requestAnimationFrame(tick)};
tick();
/* hover detection */
const onMove=(e)=>{const rect=c.getBoundingClientRect();const mx=e.clientX-rect.left,my=e.clientY-rect.top;let found=null;
zonePosRef.current.forEach(lb=>{if(Math.abs(mx-lb.cx)<18&&Math.abs(my-lb.cy)<18)found={...lb,sx:mx,sy:my}});setHover(found)};
c.addEventListener("mousemove",onMove);c.addEventListener("mouseleave",()=>setHover(null));
return()=>{if(animRef.current)cancelAnimationFrame(animRef.current);c.removeEventListener("mousemove",onMove);c.removeEventListener("mouseleave",()=>setHover(null))}},[fires,zones]);
return<div style={{position:"relative",width:"100%",height:320,overflow:"hidden"}}>
<canvas ref={canvasRef} style={{width:"100%",height:"100%"}}/>
<div style={{position:"absolute",top:6,left:8,fontFamily:"var(--mono)",fontSize:7,color:"rgba(0,180,240,0.3)",letterSpacing:2}}>NASA FIRMS</div>

{hover&&<div style={{position:"absolute",left:Math.min(hover.sx+14,280),top:Math.max(hover.sy-40,4),background:"rgba(12,12,18,0.95)",border:"1px solid var(--border)",padding:"8px 12px",borderRadius:4,fontFamily:"var(--mono)",fontSize:8,color:"var(--text)",pointerEvents:"none",zIndex:10,minWidth:120}}>

</div>}
</div>};

{divs.length>0&&<Panel title="DIVERGENCES" accent="var(--gold)" span={2}>
{divs.map((d,i)=><div key={i} style={{padding:"8px 10px",background:"var(--bg-el)",border:"1px solid var(--border)",borderRadius:4,marginBottom:4,borderLeft:"3px solid var(--gold)"}}>
<div style={{display:"flex",justifyContent:"space-between",alignItems:"center",marginBottom:2}}>
<span style={{fontFamily:"var(--mono)",fontSize:8,color:"var(--gold)",letterSpacing:1}}>{d.type?.replace(/_/g," ").toUpperCase()}</span>
<span style={{fontFamily:"var(--mono)",fontSize:8,color:d.severity==="critical"?"var(--pink)":d.severity==="high"?"var(--gold)":"var(--text-ghost)"}}>{(d.severity||"").toUpperCase()}</span></div>
<div style={{fontFamily:"var(--sans)",fontSize:12,color:"var(--text)",fontWeight:400,marginBottom:2}}>{d.name}</div>
<div style={{fontFamily:"var(--sans)",fontSize:11,color:"var(--text-dim)",fontWeight:300,lineHeight:1.5,wordBreak:"break-word"}}>{d.detail||d.description||d.title||""}</div>
</div>)}
</Panel>}
{analogues.length>0&&<Panel title="HISTORICAL RHYMES" accent="#b388ff" span={2}>
<div style={{fontFamily:"var(--mono)",fontSize:7,color:"var(--text-ghost)",letterSpacing:2,marginBottom:6}}>JIANG LAYER</div>
{analogues.slice(0,5).map((h,i)=>{const sim=h.similarity_score||h.similarity||h.match_score||0;const pct=(sim*100).toFixed(0);const c=sim>0.6?"var(--pink)":sim>0.4?"var(--gold)":"#b388ff";
return<div key={i} style={{display:"flex",alignItems:"center",gap:10,padding:"6px 0",borderBottom:"1px solid var(--border)"}}>
<div style={{width:40,textAlign:"center"}}><span style={{fontFamily:"var(--mono)",fontSize:14,color:c,fontWeight:500}}>{pct}</span><span style={{fontFamily:"var(--mono)",fontSize:7,color:"var(--text-ghost)"}}>%</span></div>
<div style={{flex:1}}>
<div style={{fontFamily:"var(--mono)",fontSize:10,color:"var(--text)"}}>{h.reference_name||h.label||h.name||"Archive Match"}</div>
<div style={{fontFamily:"var(--sans)",fontSize:10,color:"var(--text-dim)",fontWeight:300}}>{h.reference_date||h.date||""} {h.matched_count?("\u2014 "+h.matched_count+" dims"):""}</div>
{h.summary&&typeof h.summary==="string"&&<div style={{fontFamily:"var(--sans)",fontSize:9,color:"var(--text-ghost)",fontWeight:300,marginTop:2}}>{h.summary}</div>}
{h.summary&&typeof h.summary==="object"&&<div style={{display:"flex",gap:4,flexWrap:"wrap",marginTop:3}}>{Object.entries(h.summary).filter(([k,v])=>typeof v==="number"&&k.endsWith("_pct")).map(([k,v])=><span key={k} style={{fontFamily:"var(--mono)",fontSize:7,color:v>0?"var(--teal)":"var(--pink)"}}>{k.replace("_pct","").toUpperCase()} {v>0?"+":""}{v.toFixed(1)}%</span>)}</div>}
</div></div>})}
</Panel>}
{id?.awakening&&<Panel title="SINCE YOU WERE GONE" accent="var(--teal)" span={2}>
<div style={{fontFamily:"var(--sans)",fontSize:13,color:"var(--text)",fontWeight:400,lineHeight:1.7,marginBottom:8,wordBreak:"break-word"}}>{id.awakening.greeting}</div>
{(id.awakening.significant_changes||id.awakening.changes||[]).length>0&&<div style={{display:"flex",gap:6,flexWrap:"wrap"}}>
{(id.awakening.significant_changes||id.awakening.changes||[]).map((c,i)=><div key={i} style={{fontFamily:"var(--mono)",fontSize:8,padding:"3px 10px",background:"var(--bg-el)",border:"1px solid var(--border)",borderRadius:3,color:"var(--text-dim)"}}>{typeof c==="string"?c:(c.summary||c.asset||"")}</div>)}
</div>}
</Panel>}
{fg&&<Panel title="FIRST GLANCE" accent="var(--cyan)" span={2}>
<div style={{display:"flex",gap:8,flexWrap:"wrap"}}>
{[{l:"STATE",v:fg.cypher_state,c:stColor},{l:"REGIME",v:(fg.regime||"").replace(/_/g," "),c:"var(--cyan)"},{l:"CONVICTION",v:((fg.conviction||0)*100).toFixed(0)+"%",c:fg.conviction>0.6?"var(--gold)":"var(--text-dim)"},{l:"THREADS",v:String(fg.since_last_check?.major_moves?.length||0),c:"var(--text)"}].map(s=>
<div key={s.l} style={{textAlign:"center",padding:"8px 14px",background:"var(--bg-el)",border:"1px solid var(--border)",borderRadius:4,flex:1,minWidth:80}}>
<div style={{fontFamily:"var(--mono)",fontSize:7,color:"var(--text-ghost)",letterSpacing:2}}>{s.l}</div>
<div style={{fontFamily:"var(--mono)",fontSize:14,color:s.c,fontWeight:500}}>{s.v||"\u2014"}</div>
</div>)}
</div>
{fg.since_last_check?.major_moves?.length>0&&<div style={{marginTop:8}}>
<div style={{fontFamily:"var(--mono)",fontSize:7,color:"var(--text-ghost)",letterSpacing:2,marginBottom:4}}>MAJOR MOVES</div>
{fg.since_last_check.major_moves.map((m,i)=><div key={i} style={{display:"flex",justifyContent:"space-between",padding:"2px 0",fontFamily:"var(--mono)",fontSize:9,borderBottom:"1px solid var(--border)"}}>
<span style={{color:"var(--text-dim)"}}>{m.asset?.toUpperCase()}</span>
<span style={{color:m.change_pct>0?"var(--teal)":"var(--pink)"}}>{m.change_pct>0?"+":""}{m.change_pct?.toFixed(2)}%</span>
</div>)}
</div>}
</Panel>}
{intel?.tripwires&&<Panel title="TRIPWIRES" accent="var(--gold)" span={2}>
{(intel.tripwires.triggered||[]).map((tw,i)=><div key={"t"+i} className="tripwire-row triggered"><div className="tripwire-light triggered"/><div className="tripwire-info"><div className="tripwire-name">{tw.name}</div><div className="tripwire-detail">{tw.detail}</div></div><div className="tripwire-value">{tw.value}</div></div>)}
{(intel.tripwires.warning||[]).map((tw,i)=><div key={"w"+i} className="tripwire-row warning"><div className="tripwire-light warning"/><div className="tripwire-info"><div className="tripwire-name">{tw.name}</div><div className="tripwire-detail">{tw.detail}</div></div><div className="tripwire-value">{tw.value}</div></div>)}
{(intel.tripwires.clear||[]).slice(0,5).map((tw,i)=><div key={"c"+i} className="tripwire-row clear"><div className="tripwire-light clear"/><div className="tripwire-info"><div className="tripwire-name">{tw.name}</div></div><div className="tripwire-value">{tw.value}</div></div>)}
</Panel>}
{a.summary?.top_movers?.length>0&&<Panel title="TOP MOVERS" accent="var(--teal)" span={2}>
<div style={{display:"flex",gap:6,flexWrap:"wrap"}}>{a.summary.top_movers.map((m,i)=>{const c=m.pct>0?"var(--teal)":"var(--pink)";return<div key={i} style={{textAlign:"center",padding:"5px 10px",minWidth:65,background:"var(--bg-el)",border:"1px solid var(--border)",borderRadius:3}}><div style={{fontFamily:"var(--mono)",fontSize:7,color:"var(--text-ghost)",letterSpacing:1}}>{m.asset.toUpperCase()}</div><div style={{fontFamily:"var(--mono)",fontSize:14,color:c,fontWeight:500}}>{m.pct>0?"+":""}{m.pct}%</div></div>})}</div>
</Panel>}
{a.news?.length>0&&<Panel title="NEWS" accent="var(--cyan)" span={2} ts={a.pipeTs?.news}>
{a.news.slice(0,8).map((n,i)=><NewsLine key={i} title={n.title} source={n.source} sentiment={n.sentiment}/>)}
</Panel>}
</div>
</div>};

/* ═══ TAB DOMAIN MAP ═══ */
const TAB_DOMAIN_MAP={gold:["gold","silver","copper"],energy:["brent","wti","natgas"],rates:["spx","vix"],fx:["dxy","eurusd","usdjpy","gbpusd","audusd","usdcad","usdchf"],risk:["vix","spx"],crypto:["btc"],geo:["brent","wti","natgas","wheat"],liq:["spx","btc","vix"]};

/* ═══ TAB CONTEXT BAR ═══ */
const TabContextBar=({tabId,gen2,a,onTabChange})=>{
const nar=gen2?.narrative,id=gen2?.identity,op=gen2?.operator;
const stName=id?.state?.name||"CALM";
const stColors={CALM:"#8B949E",ALERT:"#F7B731",ELEVATED:"#E09040",CRITICAL:"#E056A0",STORM:"#FF2222"};
const domains=TAB_DOMAIN_MAP[tabId]||[];
const regime=nar?.regime?.primary;
const divs=(nar?.divergences||[]).filter(d=>{const da=[d.asset_a,d.asset_b,...(d.assets||[])].filter(Boolean).map(x=>x.toLowerCase());return da.some(x=>domains.includes(x))});
const analogues=gen2?.history?.analogues||[];
const firstMatch=analogues.find(h=>{const s=h.summary;if(!s||typeof s!=="object")return false;return domains.some(d=>(d+"_pct") in s||(d+"_spot") in s)});
const whisper=firstMatch?("Jiang: "+(firstMatch.reference_name||"pattern")+" ("+(((firstMatch.similarity_score||0)*100).toFixed(0))+"%)"):analogues[0]?("Jiang: "+(analogues[0].reference_name||"pattern")+" ("+(((analogues[0].similarity_score||0)*100).toFixed(0))+"%)"):null;
const ctl=op?.cross_tab_links||{};const tabAliases={gold:["gold","metals"],energy:["energy","oil"],rates:["rates","bonds","yields"],fx:["fx","currency"],risk:["risk","equities","correlations","volatility"],crypto:["crypto","bitcoin"],geo:["geo","geopolitical"],liq:["liq","liquidity","macro"]};const myAliases=tabAliases[tabId]||[tabId];const links=Object.values(ctl).filter(tabs=>Array.isArray(tabs)&&tabs.some(t=>myAliases.includes(t))).length;
if(!nar&&!id)return null;
return<div className="tab-ctx" style={{borderLeftColor:stColors[stName]||"var(--cyan)"}}>
<div className="ctx-wire" style={{background:stColors[stName],boxShadow:"0 0 6px "+stColors[stName]}}/>
{regime&&<span className="ctx-regime">{regime.name?.replace(/_/g," ")}</span>}
{divs.slice(0,3).map((d,i)=><span key={i} className={"ctx-div "+(d.severity||"warning")} title={d.detail||d.name}>{d.name||d.type}</span>)}
{whisper&&<span className="ctx-whisper">{whisper}</span>}
{links>0&&<span className="ctx-links"><span style={{width:4,height:4,borderRadius:"50%",background:"var(--cyan)",display:"inline-block",marginRight:2}}/>{links} wire{links>1?"s":""}</span>}
</div>};

/* ═══ CIPHER CHART (Candlestick + 1Y) ═══ */
const CipherChart=({asset,span})=>{
const containerRef=useRef(null);const chartRef=useRef(null);const seriesRef=useRef(null);const roRef=useRef(null);
const[loading,setLoading]=useState(true);const[err,setErr]=useState(null);
const[maVis,setMaVis]=useState({sma20:true,sma50:true,sma200:true});
const[data,setData]=useState(null);
useEffect(()=>{fetch(CIPHER_API+"/api/price-history/"+asset+"?days=365").then(r=>r.json()).then(d=>{setData(d);setLoading(false)}).catch(e=>{setErr(e.message);setLoading(false)})},[asset]);
/* Effect 1: chart creation — deferred to setTimeout so container has layout width */
useEffect(()=>{
if(!data?.series?.length||!window.LightweightCharts)return;
const buildChart=()=>{
const el=containerRef.current;if(!el||el.clientWidth<10)return;
if(chartRef.current){chartRef.current.remove();chartRef.current=null}
const chart=LightweightCharts.createChart(el,{width:el.clientWidth,height:220,
layout:{background:{color:"#0c0c12"},textColor:"rgba(200,210,220,0.45)",fontFamily:"'JetBrains Mono',monospace",fontSize:9},
grid:{vertLines:{color:"rgba(0,180,240,0.03)"},horzLines:{color:"rgba(0,180,240,0.03)"}},
crosshair:{mode:0,vertLine:{color:"rgba(0,180,240,0.15)",labelBackgroundColor:"#0c0c12"},horzLine:{color:"rgba(0,180,240,0.15)",labelBackgroundColor:"#0c0c12"}},
rightPriceScale:{borderColor:"rgba(0,180,240,0.08)"},timeScale:{borderColor:"rgba(0,180,240,0.08)",timeVisible:false}});
const hasOHLC=data.series[0]?.open!=null;
let mainSeries;
if(hasOHLC){mainSeries=chart.addCandlestickSeries({upColor:"#4ecdc4",downColor:"#e056a0",borderUpColor:"#4ecdc4",borderDownColor:"#e056a0",wickUpColor:"#4ecdc488",wickDownColor:"#e056a088"});mainSeries.setData(data.series.map(p=>({time:p.date,open:p.open,high:p.high,low:p.low,close:p.close})))}
else{mainSeries=chart.addLineSeries({color:"#00b4f0",lineWidth:2,priceLineVisible:false,lastValueVisible:true,crosshairMarkerRadius:4});mainSeries.setData(data.series.map(p=>({time:p.date,value:p.close})))}
const maC={sma20:"#4ecdc4",sma50:"#f7b731",sma200:"#e056a0"};const refs={main:mainSeries};
["sma20","sma50","sma200"].forEach(ma=>{
const md=data.series.filter(p=>p[ma]).map(p=>({time:p.date,value:p[ma]}));
if(md.length>0){const s=chart.addLineSeries({color:maC[ma],lineWidth:1,lineStyle:2,priceLineVisible:false,lastValueVisible:false,crosshairMarkerVisible:false,visible:maVis[ma]});s.setData(md);refs[ma]=s}
else if(data.current_ma?.[ma]){mainSeries.createPriceLine({price:data.current_ma[ma],color:maC[ma],lineWidth:1,lineStyle:1,axisLabelVisible:true,title:ma.toUpperCase()})}});
chart.timeScale().fitContent();chartRef.current=chart;seriesRef.current=refs;
const ro=new ResizeObserver(()=>{if(el&&chartRef.current)chartRef.current.applyOptions({width:el.clientWidth})});ro.observe(el);roRef.current=ro};
/* Try immediately, retry after short delay if container not ready */
const tid=setTimeout(()=>{if(!chartRef.current)buildChart()},50);
buildChart();
return()=>{clearTimeout(tid);if(roRef.current)roRef.current.disconnect();if(chartRef.current){chartRef.current.remove();chartRef.current=null;seriesRef.current=null}}},[data]);
/* Effect 2: MA visibility toggle — no chart recreation */
useEffect(()=>{const refs=seriesRef.current;if(!refs)return;["sma20","sma50","sma200"].forEach(ma=>{if(refs[ma])refs[ma].applyOptions({visible:maVis[ma]})})},[maVis]);
if(loading)return<Panel title={asset.toUpperCase()+" CHART"} span={span}><div style={{height:220,display:"flex",alignItems:"center",justifyContent:"center"}}><div className="spinner"/></div></Panel>;
if(err||!data?.series?.length)return<Panel title={asset.toUpperCase()+" CHART"} span={span}><div style={{fontFamily:"var(--mono)",fontSize:9,color:"var(--text-ghost)",textAlign:"center",padding:40}}>Chart: {data?.points||0} points</div></Panel>;
const last=data.series[data.series.length-1];
return<Panel title={asset.toUpperCase()+" PRICE"} accent="var(--cyan)" glow span={span} ts={data.pulled_at}>
<div ref={containerRef} style={{width:"100%",height:220}}/>
<div style={{display:"flex",gap:6,marginTop:6,justifyContent:"center",alignItems:"center"}}>
{["sma20","sma50","sma200"].map(ma=>{const has=data.series.some(p=>p[ma])||data.current_ma?.[ma];if(!has)return null;const rgb={sma20:"78,205,196",sma50:"247,183,49",sma200:"224,86,160"};const hex={sma20:"#4ecdc4",sma50:"#f7b731",sma200:"#e056a0"};return<button key={ma} onClick={()=>setMaVis(p=>({...p,[ma]:!p[ma]}))} style={{fontFamily:"var(--mono)",fontSize:7,letterSpacing:1,padding:"2px 8px",background:maVis[ma]?"rgba("+rgb[ma]+",0.1)":"var(--bg)",border:"1px solid "+(maVis[ma]?hex[ma]+"44":"var(--border)"),color:maVis[ma]?hex[ma]:"var(--text-ghost)",cursor:"pointer",borderRadius:2}}>{ma.toUpperCase()}</button>})}
{data.points>0&&<span style={{fontFamily:"var(--mono)",fontSize:7,color:"var(--text-ghost)",marginLeft:8}}>{data.points}d</span>}
</div>
{data.percentile!=null&&<div style={{fontFamily:"var(--mono)",fontSize:8,color:"var(--text-ghost)",textAlign:"center",marginTop:4}}>1Y Percentile: <span style={{color:data.percentile>80?"var(--pink)":data.percentile<20?"var(--teal)":"var(--text)"}}>{data.percentile}%</span></div>}
</Panel>};

/* ═══ DASHBOARD SHELL ═══ */
const Dashboard=({a,intel,gen2})=>{
const hasGen2=gen2?.narrative||gen2?.identity;
const[tab,setTab]=useState(hasGen2?"cypher":"gold");
const[time,setTime]=useState(new Date());
const defaultChartAsset={gold:"gold",energy:"brent",fx:"dxy",risk:"vix",crypto:"btc"};
const[chartAsset,setChartAsset]=useState(null);
const activeChart=chartAsset||defaultChartAsset[tab]||null;
const switchTab=(t)=>{setTab(t);setChartAsset(null)};
useEffect(()=>{const t=setInterval(()=>setTime(new Date()),1000);return()=>clearInterval(t)},[]);
const zf=(id)=>a.zones.find(z=>z.id===id)||{fires:0,high:0};
const stName=gen2?.identity?.state?.name||"CALM";
const stColors={CALM:"#8B949E",ALERT:"#F7B731",ELEVATED:"#E09040",CRITICAL:"#E056A0",STORM:"#FF2222"};
const stColor=stColors[stName]||"var(--cyan)";
const pulseRate=gen2?.identity?.state?.pulse_rate||3;
const tabs=[...(hasGen2?[{id:"cypher",l:"CYPHER"}]:[]),{id:"gold",l:"GOLD"},{id:"energy",l:"ENERGY"},{id:"rates",l:"RATES"},{id:"fx",l:"FX"},{id:"risk",l:"RISK"},{id:"crypto",l:"CRYPTO"},{id:"geo",l:"GEO"},{id:"liq",l:"LIQUIDITY"}];
return<div className="cipher-shell">
<div className="cipher-header"><div className="cipher-brand"><div className="cipher-eye" data-state={stName}/><span className="name">CIPHER</span><span className="sub">muFX Intelligence</span></div><div className="cipher-meta"><div><div className="cipher-clock">{time.toLocaleTimeString("en-US",{hour12:false})}</div><div className="cipher-date">{a.date} {'\u00B7'} {a.generatedAt?timeAgo(a.generatedAt):"--"} {'\u00B7'} {a.pipesOk} PIPES {'\u00B7'} {a.flags} FLAGS{isStale(a.generatedAt)&&<span style={{color:"var(--pink)",marginLeft:4}}>STALE</span>}</div></div><div className="cipher-pulse" style={{background:stColor,boxShadow:"0 0 6px "+stColor,animation:"pulse "+pulseRate+"s ease-in-out infinite"}}/></div></div>
{gen2?.identity?.status_line&&<div style={{padding:"6px 0",marginBottom:2,borderBottom:"1px solid var(--border)",display:"flex",alignItems:"center",gap:8}}>
<span style={{fontFamily:"var(--mono)",fontSize:7,letterSpacing:2,color:stColor,textTransform:"uppercase",flexShrink:0}}>{stName}</span>
<span style={{fontFamily:"var(--sans)",fontSize:11,color:"var(--text-dim)",fontWeight:300,lineHeight:1.6,wordBreak:"break-word"}}>{gen2.identity.status_line}</span>
</div>}
<div className="cipher-tabs">{tabs.map(t=><button key={t.id} className={tab===t.id?"active":""} onClick={()=>switchTab(t.id)} style={t.id==="cypher"?{color:tab==="cypher"?stColor:"var(--text-ghost)",borderBottomColor:tab==="cypher"?stColor:"transparent"}:{}}>{t.l}</button>)}</div>
{tab==="cypher"&&<CypherTab gen2={gen2} a={a} intel={intel}/>}
{tab==="gold"&&<><TabContextBar tabId="gold" gen2={gen2} a={a} onTabChange={switchTab}/><CipherChart asset={activeChart} span={3}/><GoldTab a={a} onChart={setChartAsset} active={activeChart}/></>}
{tab==="energy"&&<><TabContextBar tabId="energy" gen2={gen2} a={a} onTabChange={switchTab}/><CipherChart asset={activeChart} span={3}/><EnergyTab a={a} zf={zf} onChart={setChartAsset} active={activeChart}/></>}
{tab==="rates"&&<><TabContextBar tabId="rates" gen2={gen2} a={a} onTabChange={switchTab}/><RatesTab a={a}/></>}
{tab==="fx"&&<><TabContextBar tabId="fx" gen2={gen2} a={a} onTabChange={switchTab}/><CipherChart asset={activeChart} span={2}/><FxTab a={a} onChart={setChartAsset} active={activeChart}/></>}
{tab==="risk"&&<><TabContextBar tabId="risk" gen2={gen2} a={a} onTabChange={switchTab}/><CipherChart asset={activeChart} span={3}/><RiskTab a={a} onChart={setChartAsset} active={activeChart}/></>}
{tab==="crypto"&&<><TabContextBar tabId="crypto" gen2={gen2} a={a} onTabChange={switchTab}/><CipherChart asset={activeChart} span={3}/><CryptoTab a={a} onChart={setChartAsset} active={activeChart}/></>}
{tab==="geo"&&<><TabContextBar tabId="geo" gen2={gen2} a={a} onTabChange={switchTab}/><GeoTab a={a} zf={zf} ts={a.pipeTs?.firms}/></>}
{tab==="liq"&&<><TabContextBar tabId="liq" gen2={gen2} a={a} onTabChange={switchTab}/><LiqTab a={a}/></>}
</div>};

/* ═══ APP ROOT ═══ */
window.CipherApp=function CipherApp(){
const[phase,setPhase]=useState("auth");
const[analytics,setAnalytics]=useState(null);
const[intel,setIntel]=useState(null);
const[gen2,setGen2]=useState({});
useEffect(()=>{if(phase==="dash"&&!analytics&&window.__CIPHER__){
setAnalytics(compute(window.__CIPHER__.briefing));setIntel(window.__CIPHER__.intel);
setGen2({narrative:window.__CIPHER__.narrative,identity:window.__CIPHER__.identity,history:window.__CIPHER__.history,operator:window.__CIPHER__.operator});
}},[phase]);
useEffect(()=>{document.body.setAttribute("data-cipher-state",gen2?.identity?.state?.name||"CALM")},[gen2]);
if(phase==="auth")return<PwGate onAuth={()=>setPhase("boot")}/>;
if(phase==="boot")return<Boot onDone={()=>setPhase("dash")}/>;
if(!analytics)return<div className="cipher-loading"><div className="spinner"/><div className="status">PROCESSING</div></div>;
return<Dashboard a={analytics} intel={intel} gen2={gen2}/>};

</script>
