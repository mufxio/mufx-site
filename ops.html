<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CIPHER OPS — Pipeline Status</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" type="image/svg+xml" href="/mufx-favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500&family=DM+Sans:opsz,wght@9..40,300;9..40,400;9..40,500&display=swap" rel="stylesheet">
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{
  --bg:#030810;--bg-card:#080c18;--bg-el:#0c1020;
  --border:rgba(0,180,240,0.06);
  --cyan:#00f7ff;--teal:#4ecdc4;--pink:#e056a0;--gold:#f7b731;
  --text:#e0e6f0;--text-dim:#8b949e;--text-ghost:rgba(200,210,220,0.25);
  --mono:'JetBrains Mono',monospace;--sans:'DM Sans',sans-serif;
}
body{background:var(--bg);color:var(--text);font-family:var(--mono);min-height:100vh}
.ops-shell{max-width:900px;margin:0 auto;padding:24px 20px}
.ops-header{display:flex;justify-content:space-between;align-items:center;margin-bottom:24px;padding-bottom:12px;border-bottom:1px solid var(--border)}
.ops-title{font-size:14px;letter-spacing:3px;color:var(--cyan)}
.ops-title span{color:var(--text-dim);font-size:10px;letter-spacing:1px;margin-left:8px}
.ops-meta{font-size:8px;color:var(--text-ghost);text-align:right;letter-spacing:1px}
.ops-meta .date{font-size:10px;color:var(--text-dim)}
.ops-meta .stale{color:var(--pink)}

/* Action bar */
.action-bar{display:flex;gap:8px;margin-bottom:20px;flex-wrap:wrap}
.action-btn{font-family:var(--mono);font-size:8px;letter-spacing:2px;padding:8px 16px;background:var(--bg-el);border:1px solid var(--border);color:var(--text-dim);cursor:pointer;transition:all .2s;text-transform:uppercase;text-decoration:none;display:inline-flex;align-items:center;gap:6px}
.action-btn:hover{border-color:var(--cyan);color:var(--cyan);background:rgba(0,247,255,0.03)}
.action-btn.primary{border-color:rgba(0,247,255,0.2);color:var(--cyan)}
.action-btn .icon{font-size:12px}

/* Stats row */
.stats-row{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:20px}
.stat-card{background:var(--bg-card);border:1px solid var(--border);padding:12px;text-align:center}
.stat-card .label{font-size:7px;letter-spacing:2px;color:var(--text-ghost);margin-bottom:4px}
.stat-card .value{font-size:20px;font-weight:500}
.stat-card .value.ok{color:var(--teal)}
.stat-card .value.warn{color:var(--gold)}
.stat-card .value.bad{color:var(--pink)}

/* Pipe table */
.pipe-table{width:100%;border-collapse:collapse;margin-bottom:24px}
.pipe-table th{font-size:7px;letter-spacing:2px;color:var(--text-ghost);text-align:left;padding:6px 8px;border-bottom:1px solid var(--border);text-transform:uppercase}
.pipe-table td{font-size:9px;padding:8px;border-bottom:1px solid rgba(0,180,240,0.03);vertical-align:middle}
.pipe-table tr:hover{background:rgba(0,180,240,0.02)}
.pipe-name{color:var(--cyan);font-weight:500;white-space:nowrap}
.pipe-source{color:var(--text-dim);font-size:8px}
.pipe-time{color:var(--text-dim)}
.pipe-time.fresh{color:var(--teal)}
.pipe-time.stale{color:var(--pink)}
.pipe-items{color:var(--text-dim);text-align:center}
.pipe-errors{text-align:center}
.pipe-errors.clean{color:var(--text-ghost)}
.pipe-errors.has-errors{color:var(--pink);font-weight:500}
.status-dot{display:inline-block;width:6px;height:6px;border-radius:50%;margin-right:6px}
.status-dot.ok{background:var(--teal);box-shadow:0 0 4px var(--teal)}
.status-dot.warn{background:var(--gold);box-shadow:0 0 4px var(--gold)}
.status-dot.stale{background:var(--pink);box-shadow:0 0 4px var(--pink);animation:blink 1.5s infinite}
.cache-badge{font-size:7px;padding:1px 4px;border-radius:2px;background:rgba(0,180,240,0.05);color:var(--text-ghost);white-space:nowrap}

/* Gen2 section */
.section-title{font-size:9px;letter-spacing:3px;color:var(--text-ghost);margin:20px 0 10px;text-transform:uppercase}
.gen2-grid{display:grid;grid-template-columns:repeat(4,1fr);gap:8px;margin-bottom:20px}
.gen2-card{background:var(--bg-card);border:1px solid var(--border);padding:10px;text-align:center}
.gen2-card .name{font-size:8px;letter-spacing:2px;color:var(--text-ghost);margin-bottom:4px;text-transform:uppercase}
.gen2-card .time{font-size:9px;color:var(--text-dim)}
.gen2-card.offline .name{color:var(--pink)}
.gen2-card.offline{border-color:rgba(224,86,160,0.1)}

/* Back link */
.back-link{font-size:8px;color:var(--text-ghost);text-decoration:none;letter-spacing:1px}
.back-link:hover{color:var(--cyan)}

/* Loading */
.loading{text-align:center;padding:60px;color:var(--text-ghost);font-size:10px;letter-spacing:2px}
.spinner{display:inline-block;width:16px;height:16px;border:2px solid var(--border);border-top-color:var(--cyan);border-radius:50%;animation:spin 0.8s linear infinite;margin-bottom:8px}
@keyframes spin{to{transform:rotate(360deg)}}
@keyframes blink{0%,100%{opacity:1}50%{opacity:0.3}}

/* Responsive */
@media(max-width:600px){
  .stats-row{grid-template-columns:repeat(2,1fr)}
  .gen2-grid{grid-template-columns:repeat(2,1fr)}
  .pipe-table{font-size:8px}
}
</style>
</head>
<body>
<div class="ops-shell" id="app">
  <div class="loading"><div class="spinner"></div><br>LOADING PIPELINE STATUS...</div>
</div>
<script>
const API='https://api.mufx.io';

function timeAgo(iso){
  if(!iso)return'—';
  const d=new Date(iso),now=new Date(),sec=Math.max(0,Math.floor((now-d)/1000));
  if(sec<60)return'just now';
  const min=Math.floor(sec/60);if(min<60)return min+'m ago';
  const hr=Math.floor(min/60);if(hr<24)return hr+'h ago';
  const day=Math.floor(hr/24);return day+'d ago';
}

function fmtTime(iso){
  if(!iso)return'—';
  try{
    const d=new Date(iso);
    return d.toISOString().replace('T',' ').substring(0,16)+' UTC';
  }catch{return iso}
}

function cacheLabel(h){
  if(h===0)return'—';
  if(h<24)return h+'h';
  if(h<168)return Math.round(h/24)+'d';
  return Math.round(h/168)+'w';
}

async function load(){
  try{
    const res=await fetch(API+'/api/pipeline-status');
    if(!res.ok)throw new Error('API error: '+res.status);
    const data=await res.json();
    render(data);
  }catch(e){
    document.getElementById('app').innerHTML=`<div class="loading" style="color:var(--pink)">ERROR: ${e.message}<br><br><a href="/cipher.html" class="back-link">&larr; BACK TO TERMINAL</a></div>`;
  }
}

function render(d){
  const pipes=d.pipes||[];
  const gen2=d.gen2||[];
  const staleCount=pipes.filter(p=>p.stale).length;
  const errCount=pipes.reduce((s,p)=>s+(p.errors||0),0);

  document.getElementById('app').innerHTML=`
    <div class="ops-header">
      <div>
        <div class="ops-title">CIPHER OPS<span>Pipeline Status</span></div>
        <a href="/cipher.html" class="back-link">&larr; back to terminal</a>
      </div>
      <div class="ops-meta">
        <div class="date">${d.briefing_date||'—'}</div>
        <div>${timeAgo(d.generated_at)} ${staleCount>0?'<span class="stale">&middot; '+staleCount+' STALE</span>':''}</div>
        <div>${d.version||''}</div>
      </div>
    </div>

    <div class="action-bar">
      <a class="action-btn primary" href="${API}/api/export" target="_blank" title="Download all data as JSON">
        <span class="icon">&#8595;</span> EXPORT JSON BUNDLE
      </a>
      <a class="action-btn" href="${API}/api/briefing/latest" target="_blank">
        <span class="icon">&#9632;</span> RAW BRIEFING
      </a>
      <a class="action-btn" href="${API}/api/intel" target="_blank">
        <span class="icon">&#9632;</span> INTEL
      </a>
      <a class="action-btn" href="${API}/api/narrative" target="_blank">
        <span class="icon">&#9632;</span> NARRATIVE
      </a>
    </div>

    <div class="stats-row">
      <div class="stat-card">
        <div class="label">PIPES OK</div>
        <div class="value ok">${d.pipes_successful||0}</div>
      </div>
      <div class="stat-card">
        <div class="label">PIPES FAILED</div>
        <div class="value ${d.pipes_failed>0?'bad':'ok'}">${d.pipes_failed||0}</div>
      </div>
      <div class="stat-card">
        <div class="label">STALE</div>
        <div class="value ${staleCount>0?'warn':'ok'}">${staleCount}</div>
      </div>
      <div class="stat-card">
        <div class="label">ERRORS</div>
        <div class="value ${errCount>0?'warn':'ok'}">${errCount}</div>
      </div>
    </div>

    <table class="pipe-table">
      <thead>
        <tr>
          <th>Pipeline</th>
          <th>Source</th>
          <th>Last Pulled</th>
          <th>Source Date</th>
          <th>Cache</th>
          <th>Items</th>
          <th>Errors</th>
        </tr>
      </thead>
      <tbody>
        ${pipes.map(p=>{
          const dotClass=p.stale?'stale':p.errors>0?'warn':'ok';
          const timeClass=p.stale?'stale':'fresh';
          return`<tr>
            <td><span class="status-dot ${dotClass}"></span><span class="pipe-name">${p.label}</span></td>
            <td class="pipe-source">${p.source}</td>
            <td class="pipe-time ${timeClass}" title="${fmtTime(p.pulled_at)}">${timeAgo(p.pulled_at)}</td>
            <td class="pipe-time" title="${p.source_date||''}">${p.source_date||'—'}</td>
            <td><span class="cache-badge">${cacheLabel(p.cache_hours)}</span></td>
            <td class="pipe-items">${p.items}</td>
            <td class="pipe-errors ${p.errors>0?'has-errors':'clean'}">${p.errors||'—'}</td>
          </tr>`;
        }).join('')}
      </tbody>
    </table>

    <div class="section-title">Gen 2 Layers (LLM)</div>
    <div class="gen2-grid">
      ${gen2.map(g=>{
        const off=!g.exists||!g.generated_at;
        return`<div class="gen2-card ${off?'offline':''}">
          <div class="name">${g.layer}</div>
          <div class="time">${off?'OFFLINE':timeAgo(g.generated_at)}</div>
        </div>`;
      }).join('')}
    </div>

    <div style="text-align:center;padding:20px 0;border-top:1px solid var(--border);margin-top:20px">
      <div style="font-size:7px;color:var(--text-ghost);letter-spacing:2px">CIPHER INTELLIGENCE SYSTEM &middot; AUTO-REFRESH 60s</div>
    </div>
  `;
}

load();
setInterval(load,60000);
</script>
</body>
</html>
