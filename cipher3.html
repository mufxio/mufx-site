<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>CIPHER — muFX Intelligence Terminal</title>
<meta name="robots" content="noindex, nofollow">
<link rel="icon" type="image/svg+xml" href="/mufx-favicon.svg">
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=JetBrains+Mono:wght@300;400;500&family=DM+Sans:opsz,wght@9..40,200;9..40,300;9..40,400;9..40,500;9..40,600&display=swap" rel="stylesheet">
<style>
:root{--bg:#060608;--bg-card:#0c0c12;--bg-el:#10101a;--cyan:#00b4f0;--cyan-dim:rgba(0,180,240,0.15);--cyan-ghost:rgba(0,180,240,0.06);--teal:#4ecdc4;--gold:#f7b731;--pink:#e056a0;--text:#c8d0d8;--text-dim:rgba(200,210,220,0.45);--text-ghost:rgba(200,210,220,0.2);--border:rgba(0,180,240,0.08);--mono:'JetBrains Mono',monospace;--sans:'DM Sans',sans-serif}
*,*::before,*::after{margin:0;padding:0;box-sizing:border-box}
body{background:var(--bg);color:var(--text);font-family:var(--sans);min-height:100vh;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background:repeating-linear-gradient(0deg,transparent,transparent 2px,rgba(0,0,0,0.04) 2px,rgba(0,0,0,0.04) 4px);pointer-events:none;z-index:1000}
.cipher-loading{display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:16px;font-family:var(--mono)}
.cipher-loading .spinner{width:20px;height:20px;border:2px solid var(--cyan-ghost);border-top-color:var(--cyan);border-radius:50%;animation:spin .8s linear infinite}
@keyframes spin{to{transform:rotate(360deg)}}
.cipher-loading .status{font-size:10px;letter-spacing:4px;color:var(--text-ghost)}
.cipher-error{display:flex;align-items:center;justify-content:center;height:100vh;flex-direction:column;gap:20px;font-family:var(--mono)}
.cipher-error .msg{font-size:11px;color:var(--pink);letter-spacing:3px}
.cipher-error .hint{font-size:9px;color:var(--text-ghost)}
.cipher-error button{background:none;border:1px solid var(--border);color:var(--cyan);padding:10px 24px;font-family:var(--mono);font-size:9px;letter-spacing:2px;cursor:pointer;transition:all .2s}
.cipher-error button:hover{background:var(--cyan-ghost)}
.pw-gate{position:fixed;inset:0;background:var(--bg);display:flex;align-items:center;justify-content:center;font-family:var(--mono);z-index:100}
.pw-gate .title{font-size:11px;letter-spacing:6px;color:var(--cyan);opacity:.5;margin-bottom:8px}
.pw-gate .subtitle{font-size:8px;letter-spacing:3px;color:var(--text-ghost);margin-bottom:32px}
.pw-gate input{background:transparent;border:1px solid var(--border);color:var(--cyan);padding:10px 16px;font-size:11px;letter-spacing:4px;text-align:center;width:220px;outline:none;font-family:var(--mono);transition:border-color .2s;display:block;margin:0 auto 8px}
.pw-gate input:focus{border-color:var(--cyan-dim)}
.pw-gate input::placeholder{color:var(--text-ghost);letter-spacing:2px;font-size:9px}
.pw-gate .btn{display:block;margin:12px auto 0;background:transparent;border:1px solid rgba(0,180,240,0.05);color:var(--text-ghost);padding:6px 20px;font-size:8px;letter-spacing:3px;cursor:pointer;font-family:var(--mono);transition:all .2s}
.pw-gate .btn:hover{color:var(--cyan);border-color:var(--border)}
.pw-gate .toggle{font-size:8px;color:var(--text-ghost);cursor:pointer;margin-top:16px;letter-spacing:1px;text-align:center}
.pw-gate .toggle:hover{color:var(--cyan)}
.pw-gate .error{font-size:8px;color:var(--pink);letter-spacing:1px;margin-top:8px;text-align:center}
.shake{animation:shake .4s}
@keyframes shake{0%,100%{transform:translateX(0)}25%{transform:translateX(-8px)}75%{transform:translateX(8px)}}
.boot{position:fixed;inset:0;background:var(--bg);font-family:var(--mono);padding:32px;display:flex;flex-direction:column;z-index:90;transition:opacity .5s}
.boot-line{font-size:11px;line-height:1.8}
.boot-bar{height:2px;background:rgba(0,180,240,0.05)}
.boot-bar-fill{height:100%;width:0%;background:linear-gradient(90deg,var(--cyan),var(--teal));transition:width .15s}
.boot-pct{display:flex;justify-content:space-between;font-size:8px;margin-bottom:4px}
.boot-pct .l{color:var(--text-ghost);letter-spacing:2px}.boot-pct .r{color:var(--cyan)}
.cipher-shell{max-width:1400px;margin:0 auto;padding:12px 16px;min-height:100vh}
.cipher-header{display:flex;justify-content:space-between;align-items:center;padding:8px 0 10px;border-bottom:1px solid var(--border);margin-bottom:12px}
.cipher-brand{display:flex;align-items:center;gap:10px}
.cipher-brand .name{font-family:var(--mono);font-size:13px;letter-spacing:6px;color:var(--cyan);font-weight:500}
.cipher-brand .sub{font-family:var(--mono);font-size:7px;letter-spacing:3px;color:var(--text-ghost);text-transform:uppercase}
.cipher-meta{display:flex;align-items:center;gap:12px}
.cipher-clock{font-family:var(--mono);font-size:11px;letter-spacing:2px;color:var(--cyan)}
.cipher-date{font-family:var(--mono);font-size:8px;color:var(--text-ghost);letter-spacing:1px}
.cipher-pulse{width:6px;height:6px;border-radius:50%;background:var(--teal);box-shadow:0 0 6px var(--teal);animation:pulse 3s ease-in-out infinite}
@keyframes pulse{0%,100%{opacity:.4;box-shadow:0 0 4px rgba(78,205,196,0.2)}50%{opacity:1;box-shadow:0 0 12px rgba(78,205,196,0.5)}}
.cipher-tabs{display:flex;gap:0;margin-bottom:14px;border-bottom:1px solid var(--border);overflow-x:auto}
.cipher-tabs button{background:transparent;border:none;border-bottom:2px solid transparent;color:var(--text-ghost);padding:8px 14px;font-family:var(--mono);font-size:9px;letter-spacing:2px;cursor:pointer;white-space:nowrap;transition:all .2s;text-transform:uppercase}
.cipher-tabs button:hover{color:var(--text-dim)}
.cipher-tabs button.active{color:var(--cyan);border-bottom-color:var(--cyan);background:var(--cyan-ghost)}
.panel{background:var(--bg-card);border:1px solid var(--border);border-radius:4px;padding:14px 16px;position:relative;overflow:hidden}
.panel.glow{box-shadow:inset 0 0 20px rgba(0,180,240,0.02)}
.panel.alert{animation:alertPulse 2s infinite}
@keyframes alertPulse{0%,100%{border-color:var(--border)}50%{border-color:rgba(224,86,160,0.2)}}
.panel-title{display:flex;align-items:center;gap:6px;margin-bottom:10px}
.panel-title .diamond{width:4px;height:4px;clip-path:polygon(50% 0%,100% 50%,50% 100%,0% 50%);opacity:.6}
.panel-title .label{font-family:var(--mono);font-size:8px;letter-spacing:2.5px;text-transform:uppercase;opacity:.6}
.panel-title .line{flex:1;height:1px;background:linear-gradient(to right,rgba(0,180,240,0.08),transparent)}
.stat-row{display:flex;justify-content:space-between;align-items:baseline;padding:2px 0;border-bottom:1px solid rgba(0,180,240,0.02)}
.stat-row.big{padding:3px 0}
.stat-label{font-family:var(--mono);font-size:8px;color:var(--text-ghost);letter-spacing:1px}
.stat-row.big .stat-label{font-size:9px}
.stat-value{font-family:var(--mono);font-size:10px;color:var(--text);letter-spacing:.5px}
.stat-row.big .stat-value{font-size:13px;font-weight:500}
.stat-pct{font-family:var(--mono);font-size:8px;margin-left:8px;min-width:42px;text-align:right}
.stat-pct.up{color:var(--teal)}.stat-pct.down{color:var(--pink)}.stat-pct.flat{color:var(--text-ghost)}
.intel-summary{display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap}
.intel-stat{background:var(--bg-card);border:1px solid var(--border);border-radius:4px;padding:10px 16px;text-align:center;min-width:100px;flex:1}
.intel-stat .n{font-family:var(--mono);font-size:22px;font-weight:500}
.intel-stat .n.critical{color:var(--pink)}.intel-stat .n.high{color:var(--gold)}.intel-stat .n.teal{color:var(--teal)}.intel-stat .n.cyan{color:var(--cyan)}
.intel-stat .l{font-family:var(--mono);font-size:7px;letter-spacing:2px;color:var(--text-ghost);text-transform:uppercase;margin-top:2px}
.thread-card{border:1px solid var(--border);border-radius:4px;background:var(--bg-card);padding:16px 18px;margin-bottom:8px;position:relative;overflow:hidden}
.thread-card::before{content:'';position:absolute;top:0;left:0;width:3px;height:100%;border-radius:2px 0 0 2px}
.thread-card.critical::before{background:linear-gradient(180deg,var(--pink),var(--gold))}
.thread-card.high::before{background:linear-gradient(180deg,var(--gold),var(--cyan))}
.thread-sev{font-family:var(--mono);font-size:7px;letter-spacing:2px;text-transform:uppercase;margin-bottom:4px}
.thread-card.critical .thread-sev{color:var(--pink)}.thread-card.high .thread-sev{color:var(--gold)}
.thread-title{font-family:var(--sans);font-size:16px;font-weight:500;color:var(--text);margin-bottom:6px}
.thread-summary{font-family:var(--sans);font-size:13px;font-weight:300;color:var(--text-dim);line-height:1.7;margin-bottom:8px}
.thread-evidence .ev{font-family:var(--mono);font-size:9px;color:var(--text-dim);padding-left:10px;position:relative;margin-bottom:2px}
.thread-evidence .ev::before{content:'\25B8';position:absolute;left:0;color:var(--cyan);opacity:.4}
.tripwire-row{display:flex;align-items:center;gap:10px;padding:8px 12px;background:var(--bg-card);border:1px solid var(--border);border-radius:4px;margin-bottom:4px}
.tripwire-light{width:8px;height:8px;border-radius:50%;flex-shrink:0}
.tripwire-light.triggered{background:var(--pink);box-shadow:0 0 8px rgba(224,86,160,0.5);animation:blink 1.5s infinite}
.tripwire-light.warning{background:var(--gold);box-shadow:0 0 6px rgba(247,183,49,0.3)}
.tripwire-light.clear{background:rgba(78,205,196,0.15);border:1px solid rgba(78,205,196,0.2)}
@keyframes blink{0%,100%{opacity:1}50%{opacity:.3}}
.tripwire-info{flex:1}
.tripwire-name{font-family:var(--mono);font-size:9px;letter-spacing:1px;color:var(--text)}
.tripwire-detail{font-family:var(--sans);font-size:10px;font-weight:300;color:var(--text-dim)}
.tripwire-value{font-family:var(--mono);font-size:11px;font-weight:500;min-width:60px;text-align:right}
.tripwire-row.triggered .tripwire-value{color:var(--pink)}
.tripwire-row.warning .tripwire-value{color:var(--gold)}
.tripwire-row.clear .tripwire-value{color:var(--teal);opacity:.5}
.priority-item{display:flex;gap:12px;padding:12px 14px;background:var(--bg-card);border:1px solid var(--border);border-radius:4px;margin-bottom:6px;border-left:3px solid transparent}
.priority-item.critical{border-left-color:var(--pink)}.priority-item.high{border-left-color:var(--gold)}
.priority-item .sev-dot{width:8px;height:8px;border-radius:50%;flex-shrink:0;margin-top:4px}
.priority-item.critical .sev-dot{background:var(--pink);box-shadow:0 0 6px rgba(224,86,160,0.4)}
.priority-item.high .sev-dot{background:var(--gold);box-shadow:0 0 6px rgba(247,183,49,0.3)}
.priority-item .type-tag{font-family:var(--mono);font-size:7px;letter-spacing:1.5px;text-transform:uppercase;color:var(--text-ghost);margin-bottom:2px}
.priority-item .title{font-family:var(--sans);font-size:13px;font-weight:500;color:var(--text);margin-bottom:4px}
.priority-item .detail{font-family:var(--sans);font-size:12px;font-weight:300;color:var(--text-dim);line-height:1.6}
.priority-item .evidence{margin-top:6px;display:flex;flex-wrap:wrap;gap:4px}
.priority-item .chip{font-family:var(--mono);font-size:8px;padding:2px 8px;border-radius:2px;background:var(--cyan-ghost);border:1px solid var(--border);color:var(--text-dim)}
.section-head{font-family:var(--mono);font-size:8px;letter-spacing:3px;text-transform:uppercase;color:var(--text-ghost);margin:16px 0 8px;display:flex;align-items:center;gap:8px}
.section-head::after{content:'';flex:1;height:1px;background:linear-gradient(to right,var(--border),transparent)}
.delta-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(120px,1fr));gap:6px}
.delta-card{background:var(--bg-card);border:1px solid var(--border);border-radius:4px;padding:10px 12px;text-align:center}
.delta-asset{font-family:var(--mono);font-size:7px;letter-spacing:2px;color:var(--text-ghost);text-transform:uppercase;margin-bottom:4px}
.delta-pct{font-family:var(--mono);font-size:16px;font-weight:500}
.delta-pct.up{color:var(--teal)}.delta-pct.down{color:var(--pink)}
.delta-abs{font-family:var(--mono);font-size:8px;color:var(--text-ghost);margin-top:2px}
.cot-grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(90px,1fr));gap:4px}
.cot-cell{padding:4px 6px;text-align:center;border-radius:2px}
.cot-cell .name{font-family:var(--mono);font-size:7px;color:var(--text-dim)}
.cot-cell .pct{font-family:var(--mono);font-size:13px;font-weight:500}
.cot-cell .oi{font-family:var(--mono);font-size:6px;color:var(--text-ghost)}
.grid-4{display:grid;grid-template-columns:repeat(4,1fr);gap:8px}
.grid-3{display:grid;grid-template-columns:repeat(3,1fr);gap:8px}
.grid-2{display:grid;grid-template-columns:repeat(2,1fr);gap:8px}
.span-2{grid-column:span 2}.span-3{grid-column:span 3}.span-4{grid-column:span 4}
@media(max-width:900px){.grid-4{grid-template-columns:repeat(2,1fr)}.span-4,.span-3{grid-column:span 2}}
@media(max-width:600px){.grid-4,.grid-3,.grid-2{grid-template-columns:1fr}.span-2,.span-3,.span-4{grid-column:span 1}.cipher-header{flex-direction:column;gap:8px;text-align:center}.intel-summary{flex-direction:column}}
@media(max-width:768px){
.topbar{padding:4px 8px}
.mode-toggle-float{display:none}
.hud-banners{display:none!important}
.hud-pipes{display:none}
.hud-state-badge{display:none}
.hud-separator{display:none}
.region-overlay{width:100vw;max-height:100vh;border-radius:0}
.region-overlay .ro-grid{grid-template-columns:1fr}
.chat-modal{width:100%!important;max-width:100%!important;height:100%!important;max-height:100%!important;border-radius:0!important}
.chat-fab{width:44px!important;height:44px!important;bottom:14px!important;right:14px!important;font-size:16px!important}
.grid-4,.grid-3,.grid-2{grid-template-columns:1fr}
.span-2,.span-3,.span-4{grid-column:span 1}
}
@keyframes fadeIn{from{opacity:0;transform:translateY(4px)}to{opacity:1;transform:translateY(0)}}
body[data-cipher-state="CALM"]{border-top:2px solid rgba(139,148,158,0.15)}
body[data-cipher-state="ALERT"]{border-top:2px solid rgba(247,183,49,0.4)}
body[data-cipher-state="ELEVATED"]{border-top:2px solid rgba(224,144,64,0.6)}
body[data-cipher-state="CRITICAL"]{border-top:2px solid rgba(224,86,160,0.8);box-shadow:inset 0 0 80px rgba(224,86,160,0.02)}
body[data-cipher-state="STORM"]{border-top:2px solid rgba(255,34,34,1);box-shadow:inset 0 0 80px rgba(255,34,34,0.03);animation:stormAmbient 4s ease-in-out infinite}
@keyframes stormAmbient{0%,100%{box-shadow:inset 0 0 60px rgba(255,34,34,0.02)}50%{box-shadow:inset 0 0 120px rgba(255,34,34,0.05)}}
.cipher-eye{width:18px;height:18px;border-radius:50%;position:relative;flex-shrink:0;transition:all 0.5s}
.cipher-eye::after{content:'';position:absolute;top:50%;left:50%;width:6px;height:6px;border-radius:50%;transform:translate(-50%,-50%);background:currentColor;box-shadow:0 0 8px currentColor;transition:all 0.5s}
.cipher-eye[data-state="CALM"]{color:#8B949E;border:1.5px solid rgba(139,148,158,0.3)}
.cipher-eye[data-state="ALERT"]{color:#F7B731;border:1.5px solid rgba(247,183,49,0.4);animation:eyePulse 2.5s ease-in-out infinite}
.cipher-eye[data-state="ELEVATED"]{color:#E09040;border:1.5px solid rgba(224,144,64,0.5);animation:eyePulse 1.5s ease-in-out infinite}
.cipher-eye[data-state="CRITICAL"]{color:#E056A0;border:1.5px solid rgba(224,86,160,0.6);animation:eyePulse 0.8s ease-in-out infinite}
.cipher-eye[data-state="STORM"]{color:#FF2222;border:1.5px solid rgba(255,34,34,0.7);animation:eyePulse 0.4s ease-in-out infinite;box-shadow:0 0 12px rgba(255,34,34,0.3)}
@keyframes eyePulse{0%,100%{opacity:0.7;transform:scale(1)}50%{opacity:1;transform:scale(1.1)}}
.tab-ctx{display:flex;align-items:center;gap:8px;padding:7px 12px;margin-bottom:10px;background:rgba(12,12,18,0.8);border:1px solid var(--border);border-radius:4px;border-left:3px solid var(--cyan);overflow-x:auto;animation:fadeIn 0.3s}
.tab-ctx .ctx-wire{width:7px;height:7px;border-radius:50%;flex-shrink:0;transition:all 0.3s}
.tab-ctx .ctx-regime{font-family:var(--mono);font-size:7px;letter-spacing:1.5px;padding:2px 8px;border-radius:2px;background:rgba(0,180,240,0.06);border:1px solid var(--border);color:var(--cyan);white-space:nowrap;flex-shrink:0}
.tab-ctx .ctx-div{font-family:var(--mono);font-size:7px;padding:2px 7px;border-radius:2px;white-space:nowrap;cursor:pointer;transition:all 0.2s;flex-shrink:0}
.tab-ctx .ctx-div:hover{filter:brightness(1.3)}
.tab-ctx .ctx-div.critical{background:rgba(224,86,160,0.06);border:1px solid rgba(224,86,160,0.12);color:var(--pink)}
.tab-ctx .ctx-div.high{background:rgba(247,183,49,0.06);border:1px solid rgba(247,183,49,0.1);color:var(--gold)}
.tab-ctx .ctx-div.warning{background:rgba(78,205,196,0.06);border:1px solid rgba(78,205,196,0.1);color:var(--teal)}
.tab-ctx .ctx-whisper{font-family:var(--sans);font-size:10px;font-weight:300;color:var(--text-dim);font-style:italic;flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.tab-ctx .ctx-links{display:flex;align-items:center;gap:3px;font-family:var(--mono);font-size:7px;color:var(--text-ghost);flex-shrink:0}
/* === TOPBAR === */
.topbar{display:flex;align-items:center;justify-content:space-between;padding:0 16px;height:48px;border-bottom:1px solid var(--border);background:linear-gradient(180deg,rgba(12,12,18,0.98),rgba(6,6,8,0.98));flex-shrink:0;position:relative}
.topbar-left{display:flex;align-items:center;gap:14px}
.topbar-right{display:flex;align-items:center;gap:16px}
.topbar::before{content:'‹‹';position:absolute;left:6px;top:50%;transform:translateY(-50%);font-family:var(--mono);font-size:10px;color:rgba(0,180,240,0.12);letter-spacing:-2px}
.topbar::after{content:'››';position:absolute;right:6px;top:50%;transform:translateY(-50%);font-family:var(--mono);font-size:10px;color:rgba(0,180,240,0.12);letter-spacing:-2px}
.topbar .hud-separator{width:1px;height:24px;background:var(--border);flex-shrink:0}
.hud-clock{font-family:var(--mono);font-size:16px;letter-spacing:3px;color:var(--cyan);font-weight:400}
.hud-date{font-family:var(--mono);font-size:7px;color:var(--text-ghost);letter-spacing:1.5px;text-align:right}
.hud-pipes{display:flex;align-items:flex-end;gap:1px;height:18px}
.hud-pipe-bar{width:3px;border-radius:1px 1px 0 0;transition:all .3s}
.mode-toggle-float{position:fixed;top:0;left:50%;transform:translateX(-50%);display:flex;border:1px solid var(--border);border-top:none;border-radius:0 0 6px 6px;overflow:hidden;background:rgba(12,12,18,0.95);backdrop-filter:blur(8px);z-index:25}
.mode-toggle-float button{background:transparent;border:none;color:var(--text-ghost);padding:6px 20px;font-family:var(--mono);font-size:8px;letter-spacing:3px;cursor:pointer;transition:all .2s;border-left:1px solid var(--border)}
.mode-toggle-float button:first-child{border-left:none}
.mode-toggle-float button.active{background:rgba(0,180,240,0.1);color:var(--cyan)}
.mode-toggle-float button:hover:not(.active){color:var(--text-dim)}
.hud-state-badge{display:flex;align-items:center;gap:6px;padding:3px 10px;border-radius:3px;border:1px solid;font-family:var(--mono);font-size:8px;letter-spacing:2px}
.hud-status-line{padding:4px 16px;border-bottom:1px solid var(--border);font-family:var(--sans);font-size:10px;color:var(--text-dim);font-weight:300;background:var(--bg);display:flex;align-items:center;gap:8px}
.hud-status-line .bracket{font-family:var(--mono);font-size:8px;color:rgba(0,180,240,0.15)}
/* === CHAT FAB + MODAL === */
.chat-fab{position:fixed;bottom:20px;right:20px;width:52px;height:52px;border-radius:50%;background:rgba(12,12,18,0.95);border:1px solid var(--border);color:var(--cyan);font-size:20px;cursor:pointer;z-index:40;display:flex;align-items:center;justify-content:center;backdrop-filter:blur(8px);transition:all .2s;font-family:var(--mono)}
.chat-fab:hover{border-color:rgba(0,180,240,0.3);background:rgba(0,180,240,0.1)}

<script>
const CIPHER_API='https://api.mufx.io';
let AUTH_TOKEN=null;
async function authFetch(p,token){try{const headers={};if(token||AUTH_TOKEN)headers['Authorization']='Bearer '+(token||AUTH_TOKEN);const r=await fetch(CIPHER_API+p,{headers});if(!r.ok)throw new Error(r.status);return await r.json()}catch(e){console.error(p,e);return null}}
async function bootData(token){
AUTH_TOKEN=token;
const[briefing,intel,narrative,identity,history,operator]=await Promise.all([
authFetch('/api/briefing/latest',token),authFetch('/api/intel',token),
authFetch('/api/narrative',token),authFetch('/api/identity',token),authFetch('/api/history',token),authFetch('/api/operator',token)]);
if(briefing){window.__CIPHER__={briefing,intel,narrative,identity,history,operator}}
return !!briefing;
}
// Initial render
window.addEventListener('DOMContentLoaded',function(){ReactDOM.render(React.createElement(window.CipherApp),document.getElementById('cipher-root'))});
</script>
<script type="text/babel">
const{useState,useEffect,useRef}=React;

/* ═══ HELPERS ═══ */
const timeAgo=(iso)=>{if(!iso)return null;const d=new Date(iso),now=new Date(),sec=Math.max(0,Math.floor((now-d)/1000));if(sec<60)return"just now";const min=Math.floor(sec/60);if(min<60)return min+"m ago";const hr=Math.floor(min/60);if(hr<24)return hr+"h ago";const day=Math.floor(hr/24);return day+"d ago"};
const isStale=(iso,hours=24)=>{if(!iso)return false;return(new Date()-new Date(iso))/(1e3*60*60)>hours};

/* ═══ COMPUTE ═══ */
const compute=(b)=>{
if(!b?.derivatives)return null;
const dv=b.derivatives,sp=dv.spot||{},ch=dv.changes_pct||{},fr=dv.fred||{},
ct=dv.cot||{},cr=dv.crypto||{},ph=dv.physical||{},cb=dv.central_banks||{},
pc=dv.percentiles||{},zs=dv.zscores||{};
const vix=sp.vix||0;
const rv=Math.min(vix/40*100,100),rc=Math.min((fr.hy_oas||0)/6*100,100),
rg=Math.min(Math.abs(ch.gold||0)/5*100,100),ro=Math.min(Math.abs(ch.brent||0)/8*100,100),
rf=Math.min(Math.abs(ch.dxy||0)/2*100,100),re=Math.min(((vix>20?50:0)+Math.abs(ch.gold||0)*10)/100*100,100);
const cotArr=Object.entries(ct).map(([k,v])=>({id:k,name:k.replace(/_/g," ").toUpperCase(),pct:v.net_pct_oi,oi:v.oi,net:v.net,ncL:v.long,ncS:v.short})).sort((a,b)=>Math.abs(b.pct)-Math.abs(a.pct));
const stables=Object.entries(cr.stables||{}).map(([k,v])=>({name:k,mcap:v})).sort((a,b)=>b.mcap-a.mcap);
const fps=[];Object.entries(b.pipes?.firms?.data||{}).forEach(([zone,data])=>{if(data?.fires)data.fires.forEach(f=>{fps.push({zone,lat:f.latitude||f.lat,lon:f.longitude||f.lon,brightness:f.brightness,conf:f.confidence,frp:f.frp})})});
return{
date:b.date,generatedAt:b.generated_at,pipesOk:b.meta?.pipes_successful,flags:b.validation?.summary?.total_flags,
pipeTs:{prices:b.pipes?.prices?.pulled_at,firms:b.pipes?.firms?.pulled_at,fred:b.pipes?.fred?.pulled_at,cot:b.pipes?.cot?.pulled_at,crypto:b.pipes?.crypto?.pulled_at,news:b.pipes?.news_sentiment?.pulled_at},
gold:sp.gold,silver:sp.silver,copper:sp.copper,brent:sp.brent,wti:sp.wti,natgas:sp.natgas,
dxy:sp.dxy,spx:sp.spx,vix:sp.vix,btc:sp.btc,nikkei:sp.nikkei,
eurusd:sp.eurusd,usdjpy:sp.usdjpy,gbpusd:sp.gbpusd,audusd:sp.audusd,usdcad:sp.usdcad,usdchf:sp.usdchf,
goldPct:ch.gold,silverPct:ch.silver,copperPct:ch.copper,brentPct:ch.brent,wtiPct:ch.wti,
natgasPct:ch.natgas,dxyPct:ch.dxy,spxPct:ch.spx,vixPct:ch.vix,btcPct:ch.btc,nikkeiPct:ch.nikkei,
eurusdPct:ch.eurusd,usdjpyPct:ch.usdjpy,gbpusdPct:ch.gbpusd,audusdPct:ch.audusd,usdcadPct:ch.usdcad,usdchfPct:ch.usdchf,
gsR:dv.gold_silver_ratio,goR:dv.gold_oil_ratio,bwS:dv.brent_wti_spread,ogR:dv.oil_gas_ratio,
s2s10:dv.curve_2s10s,s5s30:dv.curve_5s30s,s10s30:dv.curve_10s30s,
real10:dv.real_yield_10y,real5:dv.real_yield_5y,
hyIg:dv.credit_spread_hy_ig,sofrEffr:dv.sofr_effr_spread,usDeS:dv.us_germany_10y_spread,
netLiq:dv.net_liquidity_b,basis:dv.btc_basis_pct,cxCov:dv.comex_gld_coverage_pct,
y2:fr.y2,y5:fr.y5,y10:fr.y10,y30:fr.y30,be5:fr.be5,be10:fr.be10,
ig:fr.ig_oas,hy:fr.hy_oas,sofr:fr.sofr,effr:fr.effr,
rrp:fr.rrp,m2:fr.m2,de10:fr.de_10y,mortgage:fr.mortgage_30y,
unemp:fr.unemployment,bsChg:fr.walcl_chg,tgaChg:fr.tga_chg,reserveBal:fr.reserve_bal,
walclB:dv.walcl_b,tgaB:dv.tga_b,rrpB:dv.rrp_b,
fg:cr.fear_greed,fgL:cr.fear_greed_label,fgH:cr.fear_greed_7d||[],
btcDom:cr.btc_dom,ethDom:cr.eth_dom,mcapT:cr.total_mcap_t,stMcapB:cr.stablecoin_mcap_b,
tvlB:cr.tvl_b,tvlWk:cr.tvl_weekly_chg,perpBtc:cr.perp_btc,perpEth:cr.perp_eth,
gldT:ph.gld_tonnes,gldH:ph.gld_history_10d||[],
cxGR:ph.comex_gold_reg_t,cxGE:ph.comex_gold_elig_t,cxGRp:ph.comex_gold_reg_pct,
cxSR:ph.comex_silver_reg_t,cxSE:ph.comex_silver_elig_t,cxSRp:ph.comex_silver_reg_pct,
cxTotB:ph.comex_value_b,sgeCny:dv.sge_cny_gram,
pboc:cb.pboc_fix,bojZ:cb.boj_zone,ecbD:cb.ecb_depo,ecbR:cb.ecb_refi,cnyS:dv.cnh_onshore_spread,
cot:cotArr,stables,
cGold:ct.gold?.net_pct_oi,cSilver:ct.silver?.net_pct_oi,cCopper:ct.copper?.net_pct_oi,
cWti:ct.wti?.net_pct_oi,cBrent:ct.brent?.net_pct_oi,cVix:ct.vix?.net_pct_oi,
c10y:ct.ust_10y?.net_pct_oi,c2y:ct.ust_2y?.net_pct_oi,cNg:ct.natgas?.net_pct_oi,
cEur:ct.eurusd?.net_pct_oi,cJpy:ct.usdjpy?.net_pct_oi,cGbp:ct.gbpusd?.net_pct_oi,
cChf:ct.usdchf?.net_pct_oi,cAud:ct.audusd?.net_pct_oi,cCad:ct.usdcad?.net_pct_oi,
correlations:(b.correlations||[]).map(c=>({...c})),
summary:b.summary||{},fps,
zones:(dv.firms?.zones||[]).map(z=>({id:z.id,name:z.name||z.id,fires:z.fires,high:z.high})),
totF:dv.firms?.total_fires,totH:dv.firms?.total_high,
poly:(dv.polymarket||[]).map(m=>({question:m.question,yes_probability:m.yes_pct})),
percentiles:pc,zscores:zs,
goldMa:dv.gold_ma,dxyMa:dv.dxy_ma,spxMa:dv.spx_ma,eurusdMa:dv.eurusd_ma,brentMa:dv.brent_ma,
regime:{vol:rv,credit:rc,gold:rg,oil:ro,fx:rf,geo:re},
oilInv:dv.oil_inventories||{},
news:Object.values(b.pipes?.news_sentiment?.data||{}).flatMap(c=>c.articles||[]).filter(a=>a.title).slice(0,20),
swift:dv.swift_shares||{},swiftTrends:dv.swift_trends||{},
fpi:dv.food_price_index||{},
indirectTrend:dv.indirect_bid_trend||{},
wheat:sp.wheat,corn:sp.corn,soybeans:sp.soybeans,wheatPct:ch.wheat,cornPct:ch.corn,soyPct:ch.soybeans,
copperGoldRatio:dv.copper_gold_ratio,recentAuctions:(dv.recent_auctions||[]).slice(0,8)
}};

/* ═══ SHARED COMPONENTS ═══ */
const Panel=({children,title,accent="var(--cyan)",glow,alert,span,ts})=><div className={`panel${glow?" glow":""}${alert?" alert":""} ${span?"span-"+span:""}`}>{title&&<div className="panel-title"><div className="diamond" style={{background:accent}}/><span className="label" style={{color:accent}}>{title}</span><div className="line"/>{ts&&<span style={{fontFamily:"var(--mono)",fontSize:7,color:isStale(ts)?"var(--pink)":"var(--text-ghost)",letterSpacing:1,flexShrink:0}} title={ts}>{isStale(ts)?"STALE ":""}{timeAgo(ts)}</span>}</div>}{children}</div>;

const Stat=({label,value,pct,prefix="",suffix="",dec=2,big,accent})=>{
if(value===null||value===undefined)return null;
const c=pct>0?"up":pct<0?"down":"flat";
const fv=typeof value==="number"?value.toLocaleString(undefined,{minimumFractionDigits:dec,maximumFractionDigits:dec}):value;
return<div className={`stat-row${big?" big":""}`}><span className="stat-label">{label}</span><div style={{display:"flex",gap:6,alignItems:"baseline"}}><span className="stat-value" style={accent?{color:accent}:{}}>{prefix}{fv}{suffix}</span>{pct!==undefined&&pct!==null&&<span className={`stat-pct ${c}`}>{pct>0?"+":""}{pct.toFixed(2)}%</span>}</div></div>};

const ChartBtn=({asset,onChart,active,children})=>{if(!onChart)return children;const sel=active===asset;const[hov,setHov]=useState(false);return<div onClick={()=>onChart(asset)} onMouseEnter={()=>setHov(true)} onMouseLeave={()=>setHov(false)} style={{cursor:"pointer",position:"relative",borderLeft:sel?"2px solid var(--cyan)":hov?"2px solid rgba(0,180,240,0.3)":"2px solid transparent",paddingLeft:4,background:sel?"rgba(0,180,240,0.04)":hov?"rgba(0,180,240,0.02)":"transparent",transition:"all 0.15s",borderRadius:2}} title={"Chart "+asset.toUpperCase()}>{children}<div style={{position:"absolute",right:4,top:"50%",transform:"translateY(-50%)",opacity:sel?0.7:hov?0.5:0.15,transition:"opacity 0.2s",display:"flex",alignItems:"center",gap:3}}><svg width="10" height="8" viewBox="0 0 10 8" style={{opacity:0.8}}><polyline points="0,7 3,3 5,5 7,1 10,2" fill="none" stroke={sel?"var(--cyan)":"currentColor"} strokeWidth="1.2"/></svg><span style={{fontFamily:"var(--mono)",fontSize:6,color:sel?"var(--cyan)":"var(--text-ghost)",letterSpacing:1}}>CHART</span></div></div>};

const Spark=({data,w=100,h=24,vKey="close",label})=>{
if(!data?.length)return null;
const vals=data.map(d=>typeof d==="number"?d:(d[vKey]??d.value));
const mn=Math.min(...vals),mx=Math.max(...vals),rng=mx-mn||1;
const pts=vals.map((v,i)=>(i/(vals.length-1))*w+","+(h-2-((v-mn)/rng)*(h-6))).join(" ");
const last=vals[vals.length-1],first=vals[0],c=last>=first?"var(--teal)":"var(--pink)";
return<div style={{display:"inline-flex",alignItems:"center",gap:6}}>
{label&&<span style={{fontFamily:"var(--mono)",fontSize:7,color:"var(--text-ghost)",minWidth:24}}>{label}</span>}
<svg width={w} height={h}><polyline points={pts} fill="none" stroke={c} strokeWidth="1.2" opacity="0.6"/>
<circle cx={w} cy={h-2-((last-mn)/rng)*(h-6)} r="2" fill={c} opacity="0.75"/></svg>

<text x={size/2} y={size/2+1} textAnchor="middle" fill={accent} fontSize="11" fontWeight="bold" dominantBaseline="middle">{pct}%</text>
</svg>

{sub&&<div style={{fontFamily:"var(--mono)",fontSize:6,color:"var(--text-ghost)"}}>{sub}</div>}
</div>};

const CotStack=({name,ncL,ncS,pct})=>{

<div style={{display:"flex",height:5,background:"var(--bg)",overflow:"hidden",borderRadius:2}}>

const FGGauge=({value,label})=>{

const a=(value/100)*180-90,c=value<=20?"var(--pink)":value<=40?"var(--gold)":value<=60?"#b388ff":"var(--teal)";
return<div style={{textAlign:"center"}}><svg width="76" height="42" viewBox="0 0 76 42">
<defs><linearGradient id="fgg" x1="0%" x2="100%"><stop offset="0%" stopColor="#e056a0"/><stop offset="50%" stopColor="#f7b731"/><stop offset="100%" stopColor="#4ecdc4"/></linearGradient></defs>
<path d="M 4 38 A 34 34 0 0 1 72 38" fill="none" stroke="url(#fgg)" strokeWidth="2" opacity="0.2"/>

const StableDonut=({stables,total})=>{

const rd=28,cxx=35,cyy=35,circ=2*Math.PI*rd;
const cols=["var(--cyan)","#b388ff","var(--gold)","var(--teal)"];
let off=circ/4;
const segs=stables.map((s,i)=>{const pct=total>0?s.mcap/total*100:0;const seg=circ*pct/100;const o=off;off-=seg;return{name:s.name,mcap:s.mcap,seg,off:o,col:cols[i%cols.length]}});
return<div style={{display:"flex",alignItems:"center",gap:10}}>
<svg width="70" height="70" viewBox="0 0 70 70">
<circle cx={cxx} cy={cyy} r={rd} fill="none" stroke="rgba(0,180,240,0.04)" strokeWidth="5"/>
{segs.map(s=><circle key={s.name} cx={cxx} cy={cyy} r={rd} fill="none" stroke={s.col} strokeWidth="5" strokeDasharray={s.seg+" "+(circ-s.seg)} strokeDashoffset={s.off} opacity="0.55"/>)}
<text x={cxx} y={cyy-2} textAnchor="middle" fill="var(--text)" fontSize="9" fontWeight="bold" dominantBaseline="middle">{"$"+(total||0)}</text>
<text x={cxx} y={cyy+7} textAnchor="middle" fill="var(--text-ghost)" fontSize="5">BILLION</text>

<div style={{width:4,height:4,background:s.col,opacity:0.6}}/><span style={{fontFamily:"var(--mono)",fontSize:7,color:"var(--text-dim)"}}>{s.name}</span>
<span style={{fontFamily:"var(--mono)",fontSize:7,color:"var(--text)"}}>{"$"+s.mcap.toFixed(1)+"B"}</span></div>)}</div>
</div>};

const YieldDecomp=({nominal,breakeven,real})=>{
if(!nominal)return null;
const W=130,H=55,pad=4,bW=26,gap=16;
const mx=Math.max(nominal,breakeven||0,Math.abs(real||0))+0.5;
const sc=v=>Math.abs(v)/mx*(H-pad*2);
const bars=[{x:pad,v:nominal,c:"var(--cyan)",l:"NOM"},{x:pad+bW+gap,v:breakeven,c:"var(--gold)",l:"INFL"},{x:pad+2*(bW+gap),v:real,c:"var(--teal)",l:"REAL"}];
return<svg width={W} height={H+16} viewBox={"0 0 "+W+" "+(H+16)}>
{bars.map(b=><g key={b.l}><rect x={b.x} y={H-pad-sc(b.v)} width={bW} height={sc(b.v)} fill={b.c} opacity="0.35"/>
<text x={b.x+bW/2} y={H-pad-sc(b.v)-3} textAnchor="middle" fill={b.c} fontSize="8" fontWeight="bold" fontFamily="var(--mono)">{b.v}%</text>
<text x={b.x+bW/2} y={H+9} textAnchor="middle" fill="var(--text-ghost)" fontSize="6" fontFamily="var(--mono)">{b.l}</text></g>)}
</svg>};

const Radar=({data})=>{const ax=[{k:"vol",l:"VOL",c:"#e056a0"},{k:"credit",l:"CREDIT",c:"#f7b731"},{k:"gold",l:"GOLD",c:"#f7b731"},{k:"oil",l:"OIL",c:"#00b4f0"},{k:"fx",l:"FX",c:"#b388ff"},{k:"geo",l:"GEO",c:"#4ecdc4"}];const cx=82,cy=78,r=58,n=ax.length;const ang=i=>(Math.PI*2*i/n)-Math.PI/2;const pt=(i,p)=>[cx+Math.cos(ang(i))*r*p/100,cy+Math.sin(ang(i))*r*p/100];const dp=ax.map((a,i)=>pt(i,data[a.k]||0)).map((p,i)=>(i===0?"M":"L")+p[0]+" "+p[1]).join(" ")+"Z";const avg=ax.reduce((s,a)=>s+(data[a.k]||0),0)/n;const ac=avg>60?"#e056a0":avg>35?"#f7b731":"#4ecdc4";return<svg width="164" height="160" viewBox="0 0 164 160">{[25,50,75,100].map(p=><polygon key={p} points={ax.map((_,i)=>pt(i,p).join(",")).join(" ")} fill="none" stroke="rgba(0,180,240,0.06)" strokeWidth={p===50?"0.5":"0.25"}/>)}{ax.map((_,i)=><line key={i} x1={cx} y1={cy} x2={pt(i,100)[0]} y2={pt(i,100)[1]} stroke="rgba(0,180,240,0.04)" strokeWidth="0.25"/>)}<path d={dp} fill="rgba(0,180,240,0.04)" stroke={ac} strokeWidth="1.4" opacity="0.65"/>{ax.map((a,i)=>{const[px,py]=pt(i,data[a.k]||0);const[lx,ly]=pt(i,118);return<g key={a.k}><circle cx={px} cy={py} r="2.5" fill={a.c} opacity="0.65"/><text x={lx} y={ly+3} textAnchor="middle" fill={a.c} fontSize="6.5" opacity="0.6" fontFamily="var(--mono)">{a.l}</text><text x={lx} y={ly+12} textAnchor="middle" fill="var(--text-ghost)" fontSize="7.5" fontFamily="var(--mono)">{Math.round(data[a.k]||0)}</text></g>})}<text x={cx} y={cy+4} textAnchor="middle" fill={ac} fontSize="14" fontWeight="bold" fontFamily="var(--mono)">{Math.round(avg)}</text><text x={cx} y={cy+13} textAnchor="middle" fill="var(--text-ghost)" fontSize="6" fontFamily="var(--mono)">STRESS</text></svg>};

const YCurve=({y2,y5,y10,y30,be5,be10,r5,r10})=>{if(!y2)return null;const W=300,H=100,pad=26;const pts=[{t:"2Y",v:y2},{t:"5Y",v:y5},{t:"10Y",v:y10},{t:"30Y",v:y30}];const all=[...pts.map(p=>p.v),be5,be10,r5,r10].filter(Boolean);const mn=Math.min(...all)-0.3,mx=Math.max(...all)+0.3;const sy=v=>H-pad-(v-mn)/(mx-mn)*(H-2*pad);const xs=pts.map((_,i)=>pad+i*(W-2*pad)/(pts.length-1));const np=pts.map((p,i)=>(i===0?"M":"L")+xs[i]+" "+sy(p.v)).join(" ");return<svg width={W} height={H} viewBox={"0 0 "+W+" "+H} style={{display:"block",margin:"0 auto"}}><path d={np} fill="none" stroke="var(--cyan)" strokeWidth="1.8" opacity="0.7"/>{pts.map((p,i)=><g key={i}><circle cx={xs[i]} cy={sy(p.v)} r="3" fill="var(--bg)" stroke="var(--cyan)" strokeWidth="1.3"/><text x={xs[i]} y={sy(p.v)-8} textAnchor="middle" fill="var(--text)" fontSize="9" fontWeight="500" fontFamily="var(--mono)">{p.v}%</text><text x={xs[i]} y={H-6} textAnchor="middle" fill="var(--text-ghost)" fontSize="7" fontFamily="var(--mono)">{p.t}</text></g>)}{[{v:be5,x:xs[1]},{v:be10,x:xs[2]}].filter(p=>p.v).map((p,i)=><g key={"b"+i}><circle cx={p.x} cy={sy(p.v)} r="2.5" fill="var(--gold)" opacity="0.5"/><text x={p.x+(i===0?-10:10)} y={sy(p.v)+3} textAnchor={i===0?"end":"start"} fill="var(--gold)" fontSize="6" opacity="0.6" fontFamily="var(--mono)">{p.v}%</text></g>)}{[{v:r5,x:xs[1]},{v:r10,x:xs[2]}].filter(p=>p.v).map((p,i)=><g key={"r"+i}><circle cx={p.x} cy={sy(p.v)} r="2.5" fill="var(--teal)" opacity="0.5"/><text x={p.x+(i===0?-10:10)} y={sy(p.v)+3} textAnchor={i===0?"end":"start"} fill="var(--teal)" fontSize="6" opacity="0.6" fontFamily="var(--mono)">{p.v}%</text></g>)}</svg>};

const CotCell=({name,pct,oi})=>{const norm=Math.min(Math.abs(pct)/36,1);const isL=pct>0;const bg=isL?`rgba(78,205,196,${norm*0.15})`:`rgba(224,86,160,${norm*0.15})`;const bd=isL?`rgba(78,205,196,${norm*0.2+0.05})`:`rgba(224,86,160,${norm*0.2+0.05})`;return<div className="cot-cell" style={{background:bg,border:`1px solid ${bd}`}}><div className="name">{name}</div><div className="pct" style={{color:isL?"var(--teal)":"var(--pink)"}}>{pct>0?"+":""}{pct}%</div><div className="oi">{(oi/1000).toFixed(0)}K</div></div>};

.pointLabel(d=>`<div style="font-family:var(--mono);font-size:9px;background:rgba(12,12,18,0.95);border:1px solid rgba(0,180,240,0.15);padding:6px 10px;border-radius:4px;color:#c8d0d8;backdrop-filter:blur(8px)"><div style="color:var(--cyan);font-size:7px;letter-spacing:2px;margin-bottom:3px">${(d.zone||'').replace(/_/g,' ').toUpperCase()}</div><div>Brightness: <span style="color:var(--gold)">${d.brightness||'N/A'}</span></div><div>Confidence: <span style="color:${d.conf==='h'||d.conf==='high'?'var(--pink)':'var(--text-dim)'}">${d.conf||'N/A'}</span></div><div>FRP: <span style="color:var(--teal)">${d.frp||'N/A'}</span></div></div>`);
}
globeRef.current=globe;
const ro=new ResizeObserver(()=>{
if(containerRef.current&&globeRef.current){
globeRef.current.width(containerRef.current.clientWidth).height(containerRef.current.clientHeight);
}
});
ro.observe(containerRef.current);
return()=>{ro.disconnect()};
},[]);
useEffect(()=>{
if(!globeRef.current)return;
const gs=GLOBE_STYLES[globeStyle];
globeStyleRef.current=globeStyle;
if(gs.useMaterial&&typeof THREE!=='undefined'){
const mat=new THREE.MeshPhongMaterial({color:0x0a1628,transparent:true,opacity:gs.materialOpacity,side:THREE.DoubleSide});
globeRef.current.globeMaterial(mat);
globeRef.current.showGraticules(true);
globeRef.current.globeImageUrl('data:image/png;base64,iVBORw0KGgoAAAANSUhEUgAAAAEAAAABCAYAAAAfFcSJAAAAC0lEQVQI12NgAAIABQABNjN9GQAAAABJRu5ErkJggg==');
}else{
globeRef.current.globeImageUrl(gs.imageUrl);
globeRef.current.showGraticules(false);
if(typeof THREE!=='undefined'){
const mat=new THREE.MeshPhongMaterial({transparent:false,opacity:1.0});
globeRef.current.globeMaterial(mat);
globeRef.current.globeImageUrl(gs.imageUrl);
}
}
globeRef.current.atmosphereColor(gs.atmosphere).atmosphereAltitude(gs.atmosphereAlt);
globeRef.current.polygonsData(globeRef.current.polygonsData());
},[globeStyle]);
const REGION_MAP={
'840':{group:'usa',label:'UNITED STATES',assets:['dxy','spx','vix','btc'],center:{lat:39,lng:-98}},
'250':{group:'europe',label:'EUROPE',assets:['eurusd','gbpusd'],center:{lat:48,lng:10}},
'276':{group:'europe',label:'EUROPE',assets:['eurusd'],center:{lat:48,lng:10}},
'380':{group:'europe',label:'EUROPE',assets:['eurusd'],center:{lat:48,lng:10}},
'724':{group:'europe',label:'EUROPE',assets:['eurusd'],center:{lat:48,lng:10}},
'826':{group:'uk',label:'UNITED KINGDOM',assets:['gbpusd'],center:{lat:54,lng:-2}},
'392':{group:'japan',label:'JAPAN',assets:['usdjpy'],center:{lat:36,lng:139}},
'156':{group:'china',label:'CHINA',assets:['cnh'],center:{lat:35,lng:105}},
'756':{group:'switzerland',label:'SWITZERLAND',assets:['usdchf','gold'],center:{lat:47,lng:8}},
'124':{group:'canada',label:'CANADA',assets:['usdcad'],center:{lat:56,lng:-106}},
'036':{group:'australia',label:'AUSTRALIA',assets:['audusd'],center:{lat:-25,lng:134}},
'643':{group:'russia',label:'RUSSIA',assets:['natgas'],center:{lat:62,lng:105}},
'682':{group:'mideast',label:'MIDDLE EAST',assets:['brent','wti'],center:{lat:25,lng:45}},
'784':{group:'mideast',label:'UAE',assets:['brent'],center:{lat:24,lng:54}},
'152':{group:'samerica',label:'CHILE',assets:['copper'],center:{lat:-35,lng:-71}},
};
const handleRegionClick=(poly)=>{
if(!poly)return;
const id=poly.id||poly.properties?.id;
const mapping=REGION_MAP[String(id)];
if(!mapping)return;
if(globeRef.current)globeRef.current.controls().autoRotate=false;
if(globeRef.current)globeRef.current.pointOfView({lat:mapping.center.lat,lng:mapping.center.lng,altitude:1.5},1000);
setSelectedRegion(mapping);
};
return<div style={{position:'relative',width:'100%',height:'100%'}}>
<div ref={containerRef} style={{width:'100%',height:'100%'}}/>
{(globeStyle==='tactical'||globeStyle==='combat')&&<div className={"globe-mech-overlay"+(globeStyle==='combat'?' combat':'')}>
<div className="scanline"/>
<div className="reticle"/>
<div className="corner-mark tl"/><div className="corner-mark tr"/><div className="corner-mark bl"/><div className="corner-mark br"/>
{globeStyle==='combat'&&<>
<div className="crosshair-h"/><div className="crosshair-v"/>
<div className="hud-readout tl">{gen2?.identity?.state?.name||'CALM'}<br/>{gen2?.identity?.regime||'SCANNING'}</div>
<div className="hud-readout tr">{new Date().toLocaleTimeString('en-US',{hour12:false})}<br/>CIPHER SYS</div>
<div className="hud-readout bl">{a?.pipesOk||0}/21 PIPES<br/>ACTIVE</div>
<div className="hud-readout br">GLOBE MODE<br/>ARMED</div>
<div className="bracket-pair left">[ ]</div>
<div className="bracket-pair right">[ ]</div>
</>}
</div>}
<StatusHUD gen2={gen2} a={a}/>
<div className="globe-style-toggle">
{Object.keys(GLOBE_STYLES).map(k=><button key={k} className={globeStyle===k?'active':''} onClick={()=>setGlobeStyle(k)}>{k.toUpperCase()}</button>)}
</div>
<HUDBanners a={a} onSelect={setSelectedRegion}/>
{selectedRegion&&<RegionOverlay region={selectedRegion} a={a} gen2={gen2} token={token} intel={intel} onClose={()=>{setSelectedRegion(null);if(globeRef.current)globeRef.current.controls().autoRotate=true}}/>}
</div>};

/* ═══ CHAT MODAL ═══ */
const ChatModal=({token,user,open,onClose})=>{
const[messages,setMessages]=useState([]);
const[input,setInput]=useState('');
const[sending,setSending]=useState(false);
const[hasMore,setHasMore]=useState(false);
const[loadingHistory,setLoadingHistory]=useState(false);
const scrollRef=useRef(null);
const loadHistory=async(before)=>{
setLoadingHistory(true);
try{
const headers={'Authorization':'Bearer '+(token||AUTH_TOKEN)};
let url=CIPHER_API+'/api/chat/history?limit=50';
if(before)url+='&before='+before;
const r=await fetch(url,{headers});
if(r.ok){const d=await r.json();
if(before){setMessages(p=>[...(d.messages||[]).reverse(),...p])}
else{setMessages((d.messages||[]).reverse())}
setHasMore(!!d.has_more);
}
}catch(e){console.error('Chat history error',e)}
setLoadingHistory(false);
};
useEffect(()=>{if(open)loadHistory()},[open]);
useEffect(()=>{if(scrollRef.current&&!loadingHistory)scrollRef.current.scrollTop=scrollRef.current.scrollHeight},[messages,sending]);
const send=async()=>{
if(!input.trim()||sending)return;
const text=input.trim();setInput('');setSending(true);
setMessages(p=>[...p,{role:'user',content:text,timestamp:new Date().toISOString()}]);
try{
const r=await fetch(CIPHER_API+'/api/chat/send',{method:'POST',headers:{'Content-Type':'application/json','Authorization':'Bearer '+(token||AUTH_TOKEN)},body:JSON.stringify({content:text})});
if(!r.ok){
const errText=r.status===502?'CIPHER API returned 502. Check API server.':'API error: HTTP '+r.status;
setMessages(p=>[...p,{role:'assistant',content:errText,timestamp:new Date().toISOString()}]);
}else{
const d=await r.json();
if(d.assistant_message)setMessages(p=>[...p,{role:'assistant',content:d.assistant_message.content,timestamp:d.assistant_message.timestamp||new Date().toISOString()}]);
}
}catch(e){setMessages(p=>[...p,{role:'assistant',content:'Network error reaching CIPHER API.',timestamp:new Date().toISOString()}])}
setSending(false);
};
if(!open)return null;
return<div className="chat-overlay" onClick={(e)=>{if(e.target===e.currentTarget)onClose()}}>
<div className="chat-modal">
<div className="chat-header"><span className="title">{'\u98DE\u8BAF'} DISPATCH</span><button className="chat-close" onClick={onClose}>&times;</button></div>
<div className="chat-messages" ref={scrollRef}>
{hasMore&&<button onClick={()=>{const first=messages[0];if(first?.id)loadHistory(first.id)}} style={{alignSelf:'center',fontFamily:'var(--mono)',fontSize:7,letterSpacing:1,padding:'4px 12px',background:'transparent',border:'1px solid var(--border)',color:'var(--text-ghost)',cursor:'pointer',borderRadius:2,marginBottom:6}} disabled={loadingHistory}>{loadingHistory?'LOADING...':'LOAD EARLIER'}</button>}
{messages.map((m,i)=>{
const cls=m.type&&m.type!=='user'&&m.type!=='assistant'?'proactive':m.role||'assistant';
return<div key={i} className={"chat-msg "+cls}>
{m.type&&m.type!=='user'&&m.type!=='assistant'&&<div className="msg-type">{m.type}</div>}
<div>{m.content}</div>
<div className="msg-time">{timeAgo(m.timestamp)}</div>
</div>})}
{sending&&<div className="chat-msg assistant" style={{opacity:0.5}}>...</div>}
</div>
<div className="chat-input-bar">
<input value={input} onChange={e=>setInput(e.target.value)} onKeyDown={e=>e.key==='Enter'&&send()} placeholder="Ask Qwen..."/>
<button onClick={send}>SEND</button>
</div>
</div>
</div>};

/* ═══ TOP BAR ═══ */
const TopBar=({mode,onModeChange,user,gen2,a})=>{
const[time,setTime]=useState(new Date());
useEffect(()=>{const t=setInterval(()=>setTime(new Date()),1000);return()=>clearInterval(t)},[]);
const stName=gen2?.identity?.state?.name||"CALM";
const stColors={CALM:"#8B949E",ALERT:"#F7B731",ELEVATED:"#E09040",CRITICAL:"#E056A0",STORM:"#FF2222"};
const stColor=stColors[stName]||"var(--cyan)";
const pipeCount=a?.pipesOk||0;
const totalPipes=21;
return<>
<div className="mode-toggle-float">
<button className={mode==='globe'?'active':''} onClick={()=>onModeChange('globe')}>GLOBE</button>
<button className={mode==='data'?'active':''} onClick={()=>onModeChange('data')}>DATA</button>
</div>
<div className="topbar">
<div className="topbar-left">
<div className="cipher-brand"><div className="cipher-eye" data-state={stName}/><span className="name">CIPHER</span></div>
<div className="hud-separator"/>
<div className="hud-state-badge" style={{borderColor:stColor+'44',color:stColor,background:stColor+'08'}}>{'\u2039'} {stName} {'\u203A'}</div>
</div>
<div className="topbar-right">
<div className="hud-pipes" title={pipeCount+'/'+totalPipes+' pipes online'}>
{Array.from({length:totalPipes},(_,i)=><div key={i} className="hud-pipe-bar" style={{height:i<pipeCount?(6+Math.sin(i*0.7)*6)+'px':'3px',background:i<pipeCount?'var(--teal)':'var(--pink)',opacity:i<pipeCount?0.6:0.3}}/>)}
</div>
<div className="hud-separator"/>
<div><div className="hud-clock">{time.toLocaleTimeString("en-US",{hour12:false})}</div><div className="hud-date">{a?.date||""}</div></div>
<div className="cipher-pulse" style={{background:stColor,boxShadow:"0 0 6px "+stColor}}/>
</div>
</div>
{gen2?.identity?.status_line&&<div className="hud-status-line">
<span className="bracket">{'\u2039\u2039'}</span>
<span>{gen2.identity.status_line}</span>
<span className="bracket">{'\u203A\u203A'}</span>
<span style={{marginLeft:'auto',fontFamily:'var(--mono)',fontSize:7,color:'var(--text-ghost)',letterSpacing:1}}>{a?.generatedAt?timeAgo(a.generatedAt):""} {'\u00B7'} {pipeCount} PIPES</span>
</div>}
</>};

/* ═══ DATA MODE ═══ */
const DataMode=({a,intel,gen2,token})=>{
const[tab,setTab]=useState("gold");
const defaultChartAsset={gold:"gold",energy:"brent",fx:"dxy",risk:"vix",crypto:"btc"};
const[chartAsset,setChartAsset]=useState(null);
const activeChart=chartAsset||defaultChartAsset[tab]||null;
const switchTab=(t)=>{setTab(t);setChartAsset(null)};
const zf=(id)=>(a.zones||[]).find(z=>z.id===id)||{fires:0,high:0};
const tabs=[{id:"gold",l:"GOLD"},{id:"energy",l:"ENERGY"},{id:"rates",l:"RATES"},{id:"fx",l:"FX"},{id:"risk",l:"RISK"},{id:"crypto",l:"CRYPTO"},{id:"geo",l:"GEO"},{id:"liq",l:"LIQUIDITY"}];
return<div className="cipher-shell">
<div className="cipher-tabs">{tabs.map(t=><button key={t.id} className={tab===t.id?"active":""} onClick={()=>switchTab(t.id)}>{t.l}</button>)}</div>
{tab==="gold"&&<><TabContextBar tabId="gold" gen2={gen2} a={a}/><CipherChart asset={activeChart} span={3} token={token}/><GoldTab a={a} onChart={setChartAsset} active={activeChart}/></>}
{tab==="energy"&&<><TabContextBar tabId="energy" gen2={gen2} a={a}/><CipherChart asset={activeChart} span={3} token={token}/><EnergyTab a={a} zf={zf} onChart={setChartAsset} active={activeChart}/></>}
{tab==="rates"&&<><TabContextBar tabId="rates" gen2={gen2} a={a}/><RatesTab a={a}/></>}
{tab==="fx"&&<><TabContextBar tabId="fx" gen2={gen2} a={a}/><CipherChart asset={activeChart} span={2} token={token}/><FxTab a={a} onChart={setChartAsset} active={activeChart}/></>}
{tab==="risk"&&<><TabContextBar tabId="risk" gen2={gen2} a={a}/><CipherChart asset={activeChart} span={3} token={token}/><RiskTab a={a} onChart={setChartAsset} active={activeChart}/></>}
{tab==="crypto"&&<><TabContextBar tabId="crypto" gen2={gen2} a={a}/><CipherChart asset={activeChart} span={3} token={token}/><CryptoTab a={a} onChart={setChartAsset} active={activeChart}/></>}
{tab==="geo"&&<><TabContextBar tabId="geo" gen2={gen2} a={a}/><GeoTab a={a} zf={zf} ts={a.pipeTs?.firms}/></>}
{tab==="liq"&&<><TabContextBar tabId="liq" gen2={gen2} a={a}/><LiqTab a={a}/></>}
</div>};

/* ═══ APP SHELL ═══ */
const AppShell=({user,token,a,intel,gen2})=>{
const isMobileInit=typeof window!=='undefined'&&window.innerWidth<=768;
const[mode,setMode]=useState(isMobileInit?'data':'globe');
const[chatOpen,setChatOpen]=useState(false);
const[unreadCount,setUnreadCount]=useState(0);
const stName=gen2?.identity?.state?.name||'CALM';
useEffect(()=>{document.body.setAttribute('data-cipher-state',stName)},[stName]);
useEffect(()=>{
const handleResize=()=>{if(window.innerWidth<=768&&mode==='globe')setMode('data')};
window.addEventListener('resize',handleResize);
return()=>window.removeEventListener('resize',handleResize);
},[mode]);
useEffect(()=>{
const pollUnread=async()=>{
try{
const headers={'Authorization':'Bearer '+(token||AUTH_TOKEN)};
const r=await fetch(CIPHER_API+'/api/chat/unread',{headers});
if(r.ok){const d=await r.json();setUnreadCount(d.messages?.length||0)}
}catch(e){}
};
pollUnread();
const iv=setInterval(pollUnread,30000);
return()=>clearInterval(iv);
},[token]);
return<div style={{display:'flex',flexDirection:'column',height:'100vh',background:'var(--bg)'}}>
<TopBar mode={mode} onModeChange={setMode} user={user} gen2={gen2} a={a}/>
<div style={{flex:1,display:'flex',overflow:'hidden'}}>
<div style={{flex:1,overflow:mode==='data'?'auto':'hidden'}}>
{mode==='globe'&&<GlobeMode a={a} intel={intel} gen2={gen2} token={token}/>}
{mode==='data'&&<DataMode a={a} intel={intel} gen2={gen2} token={token}/>}
</div>
</div>
<button className="chat-fab" onClick={()=>setChatOpen(!chatOpen)}>
{'\u98DE\u8BAF'}{unreadCount>0&&<span className="badge">{unreadCount}</span>}
</button>
<ChatModal token={token} user={user} open={chatOpen} onClose={()=>setChatOpen(false)}/>
</div>};

/* ═══ APP ROOT ═══ */
window.CipherApp=function CipherApp(){
const[phase,setPhase]=useState('auth');
const[user,setUser]=useState(null);
const[token,setToken]=useState(null);
const[analytics,setAnalytics]=useState(null);
const[intel,setIntel]=useState(null);
const[gen2,setGen2]=useState({});
const[loadErr,setLoadErr]=useState(false);
const handleAuth=async(usr,tok)=>{
setUser(usr);setToken(tok);AUTH_TOKEN=tok;setPhase('boot');
const ok=await bootData(tok);
if(!ok)setLoadErr(true);
};
useEffect(()=>{
if(phase==='dash'&&!analytics&&window.__CIPHER__){
setAnalytics(compute(window.__CIPHER__.briefing));
setIntel(window.__CIPHER__.intel);
setGen2({narrative:window.__CIPHER__.narrative,identity:window.__CIPHER__.identity,history:window.__CIPHER__.history,operator:window.__CIPHER__.operator});
}
},[phase]);
useEffect(()=>{document.body.setAttribute('data-cipher-state',gen2?.identity?.state?.name||'CALM')},[gen2]);
if(phase==='auth')return<LoginGate onAuth={handleAuth}/>;
if(phase==='boot')return<Boot onDone={()=>{if(loadErr){document.getElementById('cipher-root').innerHTML='<div class="cipher-error"><div class="msg">CIPHER API UNREACHABLE</div><div class="hint">Could not connect</div><button onclick="location.reload()">RETRY</button></div>'}else setPhase('dash')}}/>;
if(!analytics)return<div className="cipher-loading"><div className="spinner"/><div className="status">PROCESSING</div></div>;
return<AppShell user={user} token={token} a={analytics} intel={intel} gen2={gen2}/>};

</script>
